<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal Flowchart GOST</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #eef2f3; }
        .header { background: #34495e; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .main { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        #pascalCode { width: 35%; padding: 15px; font-family: 'Consolas', monospace; border: 1px solid #bdc3c7; border-radius: 8px; background: #1e1e1e; color: #dcdcdc; font-size: 14px; outline: none; }
        #diagram-container { flex: 1; background: white; border-radius: 8px; border: 1px solid #bdc3c7; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { padding: 15px; text-align: center; background: white; border-bottom: 1px solid #ddd; }
        button { padding: 12px 35px; font-size: 16px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #219150; transform: translateY(-1px); }
        #mermaidGraph { flex: 1; overflow: auto; padding: 30px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="header">Генератор блок-схем Pascal (ГОСТ фигуры)</div>
<div class="controls">
    <button onclick="buildFlowchart()">ПОСТРОИТЬ СХЕМУ</button>
</div>

<div class="main">
    <textarea id="pascalCode">
program Task;
var x, y: real;
begin
  write('x = ');
  readln(x);
  
  if x > 6 then
    begin
      y := sqr(sin(sqrt(x))) + cos(sqrt(x));
      writeln('y = ', y:0:4);
    end
  else if x <= 2 then
    begin
      y := 8 * (x * x * x) + 5 * sqr(x) - sin(2 * x);
      writeln('y = ', y:0:4);
    end
  else
    writeln('Не определено');
    
  readln;
end.</textarea>
    
    <div id="diagram-container">
        <div id="mermaidGraph" class="mermaid"></div>
    </div>
</div>

<script>
    mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'neutral',
        flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' }
    });

    function formatText(text) {
        return text.replace(/;/g, '').replace(/'/g, '').replace(/\(/g, '[').replace(/\)/g, ']').trim();
    }

    async function buildFlowchart() {
        const code = document.getElementById('pascalCode').value;
        const container = document.getElementById('mermaidGraph');
        
        const lines = code.split('\n')
            .map(l => l.trim())
            .filter(l => l !== '' && !l.toLowerCase().startsWith('program') && !l.toLowerCase().startsWith('var') && !l.toLowerCase().includes(': real') && !l.toLowerCase().includes(': integer') && l.toLowerCase() !== 'begin' && l.toLowerCase() !== 'end' && l.toLowerCase() !== 'end.');

        let graph = "graph TD\n  Start([Начало])\n";
        let lastNode = "Start";
        let nodeIdx = 0;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let low = line.toLowerCase();

            // 1. УСЛОВИЕ (РОМБ)
            if (low.startsWith('if ') || low.startsWith('else if ')) {
                let cond = line.match(/if\s+(.*)\s+then/i)?.[1] || "Условие";
                let ifId = `if_${nodeIdx++}`;
                graph += `  ${lastNode} --> ${ifId}{"${formatText(cond)}"}\n`;
                
                // Ветка Да
                let thenId = `step_${nodeIdx++}`;
                let thenContent = lines[i+1].toLowerCase().includes('begin') ? lines[i+2] : lines[i+1];
                graph += `  ${ifId} -- Да --> ${thenId}["${formatText(thenContent)}"]\n`;
                
                // Ветка Нет / Else
                let mergeId = `merge_${nodeIdx++}`;
                let foundElse = false;
                for(let j = i; j < lines.length; j++) {
                    if(lines[j].toLowerCase().startsWith('else')) {
                        foundElse = true;
                        if(lines[j].toLowerCase().includes('if')) {
                            // Рекурсивно не пойдем, просто свяжем со следующим циклом
                            graph += `  ${ifId} -- Нет --> `;
                            lastNode = ifId; 
                            i = j - 1; // Передаем управление следующей итерации
                            break;
                        } else {
                            let elseId = `step_${nodeIdx++}`;
                            graph += `  ${ifId} -- Нет --> ${elseId}["${formatText(lines[j+1])}"]\n`;
                            graph += `  ${thenId} --> ${mergeId}(( ))\n`;
                            graph += `  ${elseId} --> ${mergeId}\n`;
                            lastNode = mergeId;
                            i = j + 1;
                            break;
                        }
                    }
                }
                if(!foundElse) {
                    graph += `  ${ifId} -- Нет --> ${mergeId}(( ))\n`;
                    graph += `  ${thenId} --> ${mergeId}\n`;
                    lastNode = mergeId;
                }
            } 
            // 2. ВВОД / ВЫВОД (ПАРАЛЛЕЛОГРАММ)
            else if (low.startsWith('read') || low.startsWith('write')) {
                let ioId = `io_${nodeIdx++}`;
                graph += `  ${lastNode} --> ${ioId}[/"${formatText(line)}"/]\n`;
                lastNode = ioId;
            }
            // 3. ПРОЦЕСС (ПРЯМОУГОЛЬНИК)
            else if (!low.startsWith('else') && !low.includes('begin') && !low.includes('end')) {
                let procId = `p_${nodeIdx++}`;
                graph += `  ${lastNode} --> ${procId}["${formatText(line)}"]\n`;
                lastNode = procId;
            }
        }

        graph += `\n  ${lastNode} --> End([Конец])`;

        container.removeAttribute('data-processed');
        container.innerHTML = graph;
        await mermaid.run({ nodes: [container] });
    }
</script>
</body>
</html>
