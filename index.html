<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой автопарк | Black Russia</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c121c 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ff3b3b, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .badge {
            display: inline-block;
            background: #2c3e2f;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .badge.admin-mode {
            background: #8B4513;
            color: #FFD700;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .car-card {
            background: rgba(20, 30, 45, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 100, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
        }
        .car-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            background: #1a1f2a;
            margin-bottom: 15px;
            border: 1px solid #ff8c42;
        }
        .car-name {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff5e00;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .specs {
            background: #00000055;
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            font-size: 0.95rem;
        }
        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #ff8c4233;
        }
        .nitro-yes {
            color: #ffaa33;
            font-weight: bold;
        }
        .nitro-no {
            color: #a0a0a0;
        }
        .delete-btn {
            background: #8b2c2c;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            box-shadow: 0 3px 0 #4a1a1a;
        }
        .delete-btn:active {
            transform: translateY(2px);
        }
        .admin-panel {
            background: #10161fe6;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #ff7b2c;
        }
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .admin-form input, .admin-form textarea {
            flex: 1;
            padding: 10px 15px;
            border-radius: 40px;
            border: none;
            background: #1e2a36;
            color: white;
            font-size: 0.9rem;
        }
        .admin-form textarea {
            border-radius: 20px;
            resize: vertical;
        }
        .admin-form button {
            background: #3a7ca5;
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: #1e2a2a;
            padding: 35px;
            border-radius: 48px;
            text-align: center;
            width: 340px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 40px;
            border: none;
            text-align: center;
            font-size: 1.2rem;
        }
        .login-card button {
            background: #ff7b2c;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .info-text {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 15px;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #aaa;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 100, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 100, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 100, 0, 0); }
        }
        .admin-panel {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏁 Мой автопарк | BLACK RUSSIA 🏎️</h1>
        <div id="adminBadge" class="badge">👤 Режим: гость</div>
    </div>

    <div id="adminZone" style="display: none;">
        <div class="admin-panel">
            <h3>🔧 Админ-панель: добавить машину</h3>
            <div class="admin-form">
                <input type="text" id="carName" placeholder="Название (например: Brabus 800)">
                <input type="text" id="carImage" placeholder="Ссылка на фото машины (URL)">
                <div class="form-row">
                    <input type="number" id="acceleration" placeholder="Разгон 0-100 км/ч (сек)" step="0.1">
                    <input type="number" id="topSpeed" placeholder="Максималка (км/ч)">
                </div>
                <div class="form-row">
                    <label style="color:#ffaa33;"><input type="checkbox" id="hasNitro"> 🚀 Есть нитро</label>
                </div>
                <textarea id="otherSpecs" rows="2" placeholder="Доп. характеристики: привод, двигатель, цена и т.д."></textarea>
                <button id="createCarBtn">➕ Добавить машину в автопарк</button>
            </div>
            <div class="info-text">✅ Админ может добавлять и удалять любые машины. Игроки только смотрят ТТХ.</div>
        </div>
    </div>

    <div id="carsContainer" class="cars-grid">
        <div class="empty-state">🏎️ Загрузка автопарка...</div>
    </div>
    <footer>🔥 Админ-доступ по ссылке /?admin | Фото машин для Black Russia</footer>
</div>

<script>
    // ---------- FIREBASE КОНФИГ ----------
    const firebaseConfig = {
        apiKey: "AIzaSyCaWv0A5OCgdAgUFn9lMzQ_tVaga0scpQA",
        authDomain: "site-5378a.firebaseapp.com",
        projectId: "site-5378a",
        storageBucket: "site-5378a.firebasestorage.app",
        messagingSenderId: "1080576728275",
        appId: "1:1080576728275:web:efdb524baf64d8bd9ac826"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const carsRef = database.ref('cars');

    // ---------- НОВЫЙ TELEGRAM БОТ ----------
    const BOT_TOKEN = "8417193861:AAH9cKzlhvANzmIAYEYZqgj_fEvBkHUAM7g";
    const ADMIN_CHAT_ID = "1209403544";

    let isAdminMode = false;
    let allCars = [];
    let currentTempPassword = null;

    // Отправка 4-значного кода в Telegram
    async function sendPasswordToTelegram(password) {
        const message = `🔐 *Вход в админ-панель | Автопарк Black Russia*\n\nВаш код для входа: \`${password}\`\n\nВведите его на сайте https://pesol45.github.io/Block/?admin`;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: ADMIN_CHAT_ID, 
                    text: message, 
                    parse_mode: 'Markdown' 
                })
            });
            const data = await response.json();
            console.log("Telegram ответ:", data);
            return data.ok;
        } catch(e) { 
            console.error("Ошибка отправки в Telegram:", e);
            return false; 
        }
    }

    // Генерация 4-значного кода
    function generateTempPassword() {
        return Math.floor(1000 + Math.random() * 9000).toString();
    }

    // Модальное окно входа с 4 цифрами
    function showAdminLoginModal() {
        const oldModal = document.getElementById('adminLoginModal');
        if (oldModal) oldModal.remove();
        
        const modalDiv = document.createElement('div');
        modalDiv.className = 'login-overlay';
        modalDiv.id = 'adminLoginModal';
        modalDiv.innerHTML = `
            <div class="login-card">
                <h3>🔐 Админ-панель автопарка</h3>
                <p>4-значный код отправлен в Telegram</p>
                <input type="password" id="adminPassInput" placeholder="Введите 4-значный код" maxlength="4" autocomplete="off">
                <button id="submitAdminPass">Подтвердить</button>
                <button id="resendPasswordBtn" style="background:#555; margin-top:10px;">🔄 Отправить код повторно</button>
                <div class="info-text">Код приходит в Telegram @${ADMIN_CHAT_ID}</div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        
        document.getElementById('submitAdminPass').addEventListener('click', () => {
            const entered = document.getElementById('adminPassInput').value;
            if (entered === currentTempPassword) {
                localStorage.setItem('admin_authenticated', 'true');
                localStorage.setItem('admin_login_time', Date.now().toString());
                window.location.href = window.location.pathname + '?admin';
            } else {
                alert("❌ Неверный код! Попробуйте ещё раз.");
                document.getElementById('adminPassInput').value = '';
            }
        });
        
        document.getElementById('resendPasswordBtn').addEventListener('click', async () => {
            const newPass = generateTempPassword();
            currentTempPassword = newPass;
            const sent = await sendPasswordToTelegram(newPass);
            if (sent) {
                alert("✅ Новый 4-значный код отправлен в Telegram!");
            } else {
                alert("❌ Не удалось отправить код. Проверьте интернет.");
            }
        });
    }

    // Запуск входа
    async function initiateAdminLogin() {
        const newPassword = generateTempPassword();
        currentTempPassword = newPassword;
        const sent = await sendPasswordToTelegram(newPassword);
        if (!sent) {
            alert("⚠️ Не удалось отправить код в Telegram. Но вы можете использовать тестовый код: " + newPassword);
        }
        showAdminLoginModal();
    }

    // Проверка доступа
    function checkAdminAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        const hasAdminParam = urlParams.has('admin');
        const alreadyAuth = localStorage.getItem('admin_authenticated') === 'true';
        
        let authValid = false;
        if (alreadyAuth) {
            const loginTime = localStorage.getItem('admin_login_time');
            if (loginTime && (Date.now() - parseInt(loginTime)) < 24 * 3600000) {
                authValid = true;
            } else {
                localStorage.removeItem('admin_authenticated');
                localStorage.removeItem('admin_login_time');
            }
        }
        
        if (hasAdminParam && authValid) {
            isAdminMode = true;
            document.getElementById('adminZone').style.display = 'block';
            document.getElementById('adminBadge').innerHTML = '👑 АДМИН АВТОПАРКА 🏁';
            document.getElementById('adminBadge').classList.add('admin-mode');
        } else if (hasAdminParam && !authValid) {
            initiateAdminLogin();
        } else {
            isAdminMode = false;
            document.getElementById('adminBadge').innerHTML = '👤 Режим: гость (только просмотр)';
            document.getElementById('adminBadge').classList.remove('admin-mode');
            document.getElementById('adminZone').style.display = 'none';
        }
        renderCars();
    }

    // Отображение машин
    function renderCars() {
        const container = document.getElementById('carsContainer');
        if (!allCars.length) {
            container.innerHTML = '<div class="empty-state">🏎️ Автопарк пуст. Админ может добавить тачки Black Russia!</div>';
            return;
        }
        container.innerHTML = '';
        allCars.forEach(car => {
            const card = document.createElement('div');
            card.className = 'car-card';
            card.innerHTML = `
                <img class="car-img" src="${escapeHtml(car.imageUrl || 'https://via.placeholder.com/400x200?text=No+Image')}" 
                     onerror="this.src='https://via.placeholder.com/400x200?text=Фото+не+загружено'">
                <div class="car-name">
                    <span>${escapeHtml(car.name)}</span>
                    ${car.hasNitro ? '<span style="font-size:1.2rem;">🚀</span>' : ''}
                </div>
                <div class="specs">
                    <div class="spec-item"><strong>🏎️ Разгон 0-100 км/ч:</strong> ${car.acceleration ?? '?'} сек</div>
                    <div class="spec-item"><strong>📈 Максимальная скорость:</strong> ${car.topSpeed ?? '?'} км/ч</div>
                    <div class="spec-item"><strong>⚡ Нитро:</strong> ${car.hasNitro ? '<span class="nitro-yes">✅ Есть</span>' : '<span class="nitro-no">❌ Нет</span>'}</div>
                    ${car.otherSpecs ? `<div class="spec-item"><strong>🔧 Характеристики:</strong><br>${escapeHtml(car.otherSpecs)}</div>` : ''}
                </div>
                ${isAdminMode ? `<button class="delete-btn" data-id="${car.id}">🗑 Удалить машину из автопарка</button>` : ''}
            `;
            container.appendChild(card);
        });
        
        if (isAdminMode) {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('Удалить машину навсегда?')) carsRef.child(id).remove();
                });
            });
        }
    }

    // Создание машины (только админ)
    function createCar() {
        if (!isAdminMode) { alert("Только админ автопарка!"); return; }
        const name = document.getElementById('carName').value.trim();
        const imageUrl = document.getElementById('carImage').value.trim();
        const acceleration = parseFloat(document.getElementById('acceleration').value);
        const topSpeed = parseInt(document.getElementById('topSpeed').value);
        const hasNitro = document.getElementById('hasNitro').checked;
        const otherSpecs = document.getElementById('otherSpecs').value.trim();
        
        if (!name) { alert("Введите название машины"); return; }
        
        const newCar = {
            name: name,
            imageUrl: imageUrl || '',
            acceleration: isNaN(acceleration) ? null : acceleration,
            topSpeed: isNaN(topSpeed) ? null : topSpeed,
            hasNitro: hasNitro,
            otherSpecs: otherSpecs || '',
            createdAt: firebase.database.ServerValue.TIMESTAMP
        };
        carsRef.push(newCar).then(() => {
            document.getElementById('carName').value = '';
            document.getElementById('carImage').value = '';
            document.getElementById('acceleration').value = '';
            document.getElementById('topSpeed').value = '';
            document.getElementById('hasNitro').checked = false;
            document.getElementById('otherSpecs').value = '';
        }).catch(err => alert("Ошибка: " + err.message));
    }

    // Подписка на изменения в Firebase
    function subscribeCars() {
        carsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const list = [];
            if (data) {
                for (let key in data) {
                    list.push({ id: key, ...data[key] });
                }
                list.reverse();
            }
            allCars = list;
            renderCars();
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function init() {
        subscribeCars();
        checkAdminAccess();
        const createBtn = document.getElementById('createCarBtn');
        if (createBtn) createBtn.addEventListener('click', createCar);
    }
    
    init();
</script>
</body>
</html>
