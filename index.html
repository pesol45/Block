<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal Flowchart 6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f8f9fa; }
        header { background: #202124; color: white; padding: 15px; text-align: center; font-size: 20px; }
        .main { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        #pascalCode { width: 35%; padding: 15px; font-family: 'Consolas', monospace; border: 1px solid #ddd; border-radius: 4px; background: #2d2d2d; color: #ccc; resize: none; }
        #diagram-container { flex: 1; background: white; border: 1px solid #ddd; display: flex; justify-content: center; overflow: auto; position: relative; }
        .toolbar { padding: 10px; background: white; border-bottom: 1px solid #ddd; text-align: center; }
        button { padding: 10px 30px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<header>Pascal Flowchart Generator</header>
<div class="toolbar">
    <button onclick="draw()">Сгенерировать схему</button>
</div>

<div class="main">
    <textarea id="pascalCode">
program Test;
var
  x, y: real;
begin
  writeln('Введите x:');
  readln(x);
  
  if x > 2 then
    y := sqrt(x) + (sqrt(cos(x)) / (2 * x))
  else
    y := 5 * sqr(x) + 4 * x + 1;
    
  writeln('Ответ y = ', y:0:2);
  readln;
end.</textarea>
    <div id="diagram-container">
        <div id="graph" class="mermaid"></div>
    </div>
</div>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

    function cleanLine(t) {
        if (!t) return "";
        // Используем специальные кавычки для Mermaid, чтобы сохранить скобки и знаки
        return t.replace(/;/g, '').replace(/'/g, '').trim();
    }

    async function draw() {
        const input = document.getElementById('pascalCode').value;
        const container = document.getElementById('graph');
        
        const rawLines = input.split('\n').map(l => l.trim());
        const lines = rawLines.filter(l => {
            const low = l.toLowerCase();
            return l !== '' && !low.startsWith('program') && !low.startsWith('var') && 
                   !low.includes(': real') && !low.includes(': integer') && 
                   low !== 'begin' && low !== 'end.' && low !== 'readln;' && low !== 'readln';
        });

        let mCode = "graph TD\n  Start([Начало])\n";
        let lastNode = "Start";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let low = line.toLowerCase();

            if (low.startsWith('if ')) {
                let cond = line.match(/if\s+(.*)\s+then/i)?.[1] || "Условие";
                let ifId = `if_${i}`;
                let thenId = `then_${i}`;
                let elseId = `else_${i}`;
                let mergeId = `m_${i}`;

                mCode += `  ${lastNode} --> ${ifId}{"${cond}"}\n`;
                
                // Ветка THEN
                mCode += `  ${ifId} -- Да --> ${thenId}["${cleanLine(lines[i+1])}"]\n`;
                
                // Ищем ELSE
                let elseIdx = -1;
                for(let j=i; j < Math.min(i+5, lines.length); j++) {
                    if(lines[j].toLowerCase().startsWith('else')) { elseIdx = j; break; }
                }

                if (elseIdx !== -1) {
                    mCode += `  ${ifId} -- Нет --> ${elseId}["${cleanLine(lines[elseIdx+1])}"]\n`;
                    mCode += `  ${thenId} --> ${mergeId}(( ))\n`;
                    mCode += `  ${elseId} --> ${mergeId}\n`;
                    i = elseIdx + 1;
                } else {
                    mCode += `  ${ifId} -- Нет --> ${mergeId}(( ))\n`;
                    mCode += `  ${thenId} --> ${mergeId}\n`;
                    i++;
                }
                lastNode = mergeId;
            } else {
                let nodeId = `s_${i}`;
                mCode += `  ${lastNode} --> ${nodeId}["${cleanLine(line)}"]\n`;
                lastNode = nodeId;
            }
        }

        mCode += `\n  ${lastNode} --> End([Конец])`;

        try {
            container.removeAttribute('data-processed');
            container.innerHTML = mCode;
            await mermaid.run({ nodes: [container] });
        } catch (e) {
            console.error(e);
            container.innerHTML = "Ошибка синтаксиса. Проверьте правильность кода Pascal.";
        }
    }
</script>
</body>
</html>
