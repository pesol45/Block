<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pascal to Flowchart — Исправленная версия</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #1e2b3a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            width: 1400px;
            max-width: 100%;
            background: #f8fafc;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .header {
            background: #0f172a;
            color: white;
            padding: 24px 32px;
        }
        .header h2 {
            font-weight: 500;
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h2 span {
            background: #3b82f6;
            padding: 4px 12px;
            font-size: 0.9rem;
            border-radius: 40px;
            font-weight: 400;
        }
        .toolbar {
            background: white;
            padding: 16px 32px;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        button.secondary {
            background: #334155;
        }
        .main-panel {
            display: flex;
            flex-direction: row;
            padding: 24px;
            gap: 24px;
            background: #f1f5f9;
        }
        .editor-section {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }
        .editor-header {
            background: #e6edf5;
            padding: 12px 20px;
            font-weight: 600;
            color: #0f172a;
            border-bottom: 1px solid #cbd5e1;
        }
        textarea {
            width: 100%;
            min-height: 500px;
            padding: 24px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #fcfcfd;
            color: #0f172a;
            border: none;
            resize: vertical;
            outline: none;
        }
        .diagram-section {
            flex: 1.2;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .diagram-header {
            background: #e6edf5;
            padding: 12px 20px;
            font-weight: 600;
            color: #0f172a;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .zoom-controls {
            display: flex;
            gap: 8px;
        }
        .zoom-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            width: 34px;
            height: 34px;
            font-weight: bold;
            color: #1e293b;
            cursor: pointer;
        }
        #diagram-container {
            flex: 1;
            padding: 24px;
            overflow: auto;
            background: #ffffff;
            min-height: 500px;
        }
        .mermaid {
            display: flex;
            justify-content: center;
            transition: transform 0.1s;
            transform-origin: top center;
        }
        .status-bar {
            background: #e2e8f0;
            padding: 12px 32px;
            font-size: 0.9rem;
            color: #334155;
            border-top: 1px solid #cbd5e1;
        }
        .example-selector {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h2>
            ⚡ Pascal → Блок-схема
            <span>v2.1 — исправлено экранирование</span>
        </h2>
        <p>Корректно работает с математическими выражениями и скобками</p>
    </div>

    <div class="toolbar">
        <button onclick="generateFlowchart()">
            <span>🔄</span> Построить схему
        </button>
        <button class="secondary" onclick="clearCode()">
            <span>🗑️</span> Очистить
        </button>
        <div class="example-selector">
            <button class="secondary" onclick="loadExample('simple')">Простой</button>
            <button class="secondary" onclick="loadExample('math')">С математ. формулами</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="editor-section">
            <div class="editor-header">📄 Исходный код Pascal</div>
            <textarea id="pascalCode" placeholder="Введите код Pascal...">program Test;
var
  x, y: real;
begin
  writeln('Введите x:');
  readln(x);
  
  if x > 2 then
    y := sqrt(x) + (sqrt(cos(x)) / (2 * x))
  else
    y := 5 * sqr(x) + 4 * x + 1;
    
  writeln('Ответ y = ', y:0:2);
  readln;
end.</textarea>
        </div>

        <div class="diagram-section">
            <div class="diagram-header">
                <span>📊 Блок-схема</span>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomMermaid(0.1)">+</button>
                    <button class="zoom-btn" onclick="zoomMermaid(-0.1)">−</button>
                    <button class="zoom-btn" onclick="resetZoom()">↺</button>
                </div>
            </div>
            <div id="diagram-container">
                <div class="mermaid" id="mermaidGraph" style="transform: scale(1);">
                    graph TD
                    Start([Начало]) --> Finish([Конец])
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar" id="status">
        ✅ Готов. Нажмите «Построить схему» для генерации.
    </div>
</div>

<script>
    // Инициализация Mermaid
    mermaid.initialize({
        startOnLoad: true,
        theme: 'default',
        flowchart: {
            useMaxWidth: false,
            htmlLabels: true,
            curve: 'basis',
            padding: 20
        },
        securityLevel: 'loose',
    });

    // Управление зумом
    let currentScale = 1.0;
    const mermaidElement = document.getElementById('mermaidGraph');

    window.zoomMermaid = function(delta) {
        currentScale = Math.min(2.0, Math.max(0.5, currentScale + delta));
        mermaidElement.style.transform = `scale(${currentScale})`;
    };

    window.resetZoom = function() {
        currentScale = 1.0;
        mermaidElement.style.transform = 'scale(1)';
    };

    window.clearCode = function() {
        document.getElementById('pascalCode').value = '';
        updateStatus('Поле очищено', '#64748b');
    };

    // Загрузка примеров
    window.loadExample = function(type) {
        const examples = {
            simple: `program Simple;
var a: integer;
begin
  readln(a);
  if a > 0 then
    writeln('Positive')
  else
    writeln('Negative');
  writeln('Done');
end.`,
            math: `program Test;
var
  x, y: real;
begin
  writeln('Введите x:');
  readln(x);
  
  if x > 2 then
    y := sqrt(x) + (sqrt(cos(x)) / (2 * x))
  else
    y := 5 * sqr(x) + 4 * x + 1;
    
  writeln('Ответ y = ', y:0:2);
  readln;
end.`
        };
        document.getElementById('pascalCode').value = examples[type] || examples.simple;
        updateStatus(`📂 Загружен пример: ${type}`, '#2563eb');
    };

    function updateStatus(text, color = '#334155') {
        const status = document.getElementById('status');
        status.innerHTML = text;
        status.style.color = color;
    }

    // Функция для экранирования спецсимволов в тексте для Mermaid
    function escapeMermaidText(text) {
        if (!text) return '';
        // Удаляем лишние пробелы
        text = text.trim();
        // Заменяем кавычки
        text = text.replace(/"/g, '#quot;');
        // Заменяем скобки на безопасные аналоги (для Mermaid важны только круглые в некоторых контекстах)
        // Но мы просто экранируем все потенциально опасные символы
        text = text.replace(/[\(\)\[\]\{\}]/g, function(match) {
            return '#' + match.charCodeAt(0) + ';';
        });
        // Ограничиваем длину, чтобы не сломать граф
        if (text.length > 50) {
            text = text.substring(0, 47) + '...';
        }
        return text;
    }

    // Основная функция генерации
    function generateFlowchart() {
        const code = document.getElementById('pascalCode').value;
        const outputDiv = document.getElementById('mermaidGraph');
        
        try {
            // Предобработка кода
            const cleanCode = preprocessPascal(code);
            
            // Построение графа
            const graphDefinition = buildGraph(cleanCode);
            
            // Проверка, что граф не пустой
            if (!graphDefinition || graphDefinition.length < 10) {
                throw new Error('Не удалось построить граф');
            }
            
            // Отрисовка
            outputDiv.removeAttribute('data-processed');
            outputDiv.innerHTML = graphDefinition;
            
            mermaid.render('preparedScheme', graphDefinition).then(res => {
                outputDiv.innerHTML = res.svg;
                updateStatus('✅ Блок-схема успешно построена', '#0f7b3a');
            }).catch(err => {
                console.error('Mermaid render error:', err);
                console.log('Graph definition:', graphDefinition);
                outputDiv.innerHTML = `<div style="color:red;padding:2rem;">
                    ❌ Ошибка отрисовки: ${err.message}<br>
                    <pre style="background:#f0f0f0;padding:1rem;margin-top:1rem;text-align:left;">${escapeMermaidText(graphDefinition)}</pre>
                </div>`;
                updateStatus('❌ Ошибка отрисовки графа', '#b91c1c');
            });
        } catch (e) {
            console.error(e);
            outputDiv.innerHTML = `<div style="color:#b91c1c; background:#fee; padding:2rem;border-radius:16px;">
                <strong>Ошибка построения схемы:</strong><br>${e.message}
            </div>`;
            updateStatus('⚠️ Ошибка при генерации', '#b91c1c');
        }
    }

    // Предобработка Pascal кода
    function preprocessPascal(src) {
        // Удаляем комментарии
        src = src.replace(/\(\*.*?\*\)/gs, ' ').replace(/\{.*?\}/gs, ' ');
        // Разбиваем на строки и удаляем пустые
        return src.split('\n')
            .map(l => l.trim())
            .filter(l => l.length > 0)
            .join('\n');
    }

    // Упрощённый, но надёжный построитель графа
    function buildGraph(src) {
        const lines = src.split('\n');
        let graph = 'graph TD\n';
        let nodeCounter = 0;
        let lastNodeId = 'Start';
        
        // Начальный узел
        graph += '  Start([Начало])\n';
        
        let currentId = 'Start';
        let inThen = false;
        let inElse = false;
        let conditionNode = null;
        let afterIfNode = null;
        let ifStack = [];
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].toLowerCase();
            let originalLine = lines[i];
            
            // Пропускаем program, var, begin
            if (line.startsWith('program') || line.startsWith('var') || line.startsWith('begin')) {
                continue;
            }
            
            // Конец программы
            if (line.startsWith('end.') || line === 'end;' || line === 'end') {
                nodeCounter++;
                let endNodeId = `N${nodeCounter}`;
                graph += `  ${endNodeId}([Конец])\n`;
                graph += `  ${currentId} --> ${endNodeId}\n`;
                currentId = endNodeId;
                break;
            }
            
            // Обработка if
            if (line.includes('if ') && line.includes(' then')) {
                let condition = originalLine.substring(
                    originalLine.toLowerCase().indexOf('if') + 2,
                    originalLine.toLowerCase().indexOf('then')
                ).trim();
                
                // Экранируем условие
                condition = escapeMermaidText(condition);
                
                // Узел условия
                nodeCounter++;
                conditionNode = `N${nodeCounter}`;
                graph += `  ${conditionNode}{${condition}}\n`;
                graph += `  ${currentId} --> ${conditionNode}\n`;
                
                // Узел слияния после if-else
                nodeCounter++;
                afterIfNode = `N${nodeCounter}`;
                graph += `  ${afterIfNode}([объединение])\n`;
                
                // Сохраняем в стек
                ifStack.push({
                    conditionNode: conditionNode,
                    afterIfNode: afterIfNode,
                    elseNode: null
                });
                
                // Временный узел для then
                nodeCounter++;
                let thenNode = `N${nodeCounter}`;
                graph += `  ${thenNode}[then]\n`;
                graph += `  ${conditionNode} -- "Да" --> ${thenNode}\n`;
                
                currentId = thenNode;
                inThen = true;
                continue;
            }
            
            // Обработка else
            if (line.startsWith('else')) {
                if (ifStack.length > 0) {
                    let lastIf = ifStack[ifStack.length - 1];
                    
                    // Узел для else
                    nodeCounter++;
                    let elseNode = `N${nodeCounter}`;
                    graph += `  ${elseNode}[else]\n`;
                    graph += `  ${lastIf.conditionNode} -- "Нет" --> ${elseNode}\n`;
                    
                    // Сохраняем ссылку на else узел
                    lastIf.elseNode = elseNode;
                    
                    currentId = elseNode;
                    inThen = false;
                    inElse = true;
                }
                continue;
            }
            
            // Обычные операторы (readln, writeln, присваивания)
            if (line.length > 0 && !line.startsWith('end;') && !line.startsWith('end')) {
                // Очищаем строку от точки с запятой в конце
                let cleanLine = originalLine.replace(/;$/, '').trim();
                
                // Экранируем спецсимволы
                cleanLine = escapeMermaidText(cleanLine);
                
                // Создаем узел
                nodeCounter++;
                let newNodeId = `N${nodeCounter}`;
                graph += `  ${newNodeId}[${cleanLine}]\n`;
                graph += `  ${currentId} --> ${newNodeId}\n`;
                
                currentId = newNodeId;
            }
            
            // Проверяем, не закончился ли блок if (после end;)
            if (line === 'end;' && ifStack.length > 0) {
                let lastIf = ifStack.pop();
                
                // Соединяем текущий узел с узлом слияния
                graph += `  ${currentId} --> ${lastIf.afterIfNode}\n`;
                
                // Если был else, соединяем else с afterIf
                if (lastIf.elseNode) {
                    // Проверяем, не соединен ли уже elseNode
                    graph += `  ${lastIf.elseNode} --> ${lastIf.afterIfNode}\n`;
                }
                
                // Текущим узлом становится узел слияния
                currentId = lastIf.afterIfNode;
            }
        }
        
        return graph;
    }
</script>
</body>
</html>
