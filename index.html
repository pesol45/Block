<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pascal to Flowchart - профессиональный конвертер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #16213e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .main-content {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            padding: 20px;
            background: #0f3460;
        }

        .code-panel {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .code-panel h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code-input {
            width: 100%;
            height: 500px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            background: #0d0d1a;
            color: #00ff9d;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            resize: vertical;
        }

        .code-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #2a2a4a;
            color: white;
        }

        .btn-example {
            background: #00b894;
            color: white;
        }

        .examples-list {
            margin-top: 20px;
            padding: 15px;
            background: #0d0d1a;
            border-radius: 10px;
        }

        .examples-list h3 {
            color: #a8a8c9;
            margin-bottom: 10px;
        }

        .example-item {
            padding: 10px;
            margin: 5px 0;
            background: #1f1f3a;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .example-item:hover {
            background: #2a2a4a;
        }

        .flowchart-panel {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow-x: auto;
        }

        .flowchart-container {
            background: #0d0d1a;
            border-radius: 10px;
            padding: 20px;
            min-height: 600px;
            position: relative;
        }

        #flowchartSvg {
            display: block;
            margin: 0 auto;
            background: #0d0d1a;
        }

        /* Стили для узлов */
        .node {
            cursor: pointer;
            transition: filter 0.3s;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .node-text {
            fill: white;
            font-size: 12px;
            font-weight: 500;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        .edge {
            stroke: #4a4a6a;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .edge-label {
            fill: #a8a8c9;
            font-size: 11px;
            font-weight: bold;
        }

        .stats {
            margin-top: 15px;
            padding: 15px;
            background: #0d0d1a;
            border-radius: 10px;
            color: #a8a8c9;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Pascal Flowchart Generator</h1>
            <p>Профессиональное построение блок-схем с ветвлениями и циклами</p>
        </header>

        <div class="main-content">
            <div class="code-panel">
                <h2>📝 Введите код Pascal</h2>
                <textarea id="pascalCode" class="code-input" placeholder="Введите код на Pascal...">program Example;
var
  a, b, c: integer;
begin
  writeln('Введите два числа:');
  readln(a, b);
  
  if a > b then
  begin
    c := a;
    writeln('a больше b');
  end
  else
  begin
    c := b;
    writeln('b больше или равно a');
  end;
  
  writeln('Максимальное число: ', c);
  
  if c > 10 then
    writeln('Число больше 10')
  else
    writeln('Число меньше или равно 10');
    
  readln;
end.</textarea>
                
                <div class="button-group">
                    <button class="btn btn-primary" onclick="generateFlowchart()">
                        🔄 Построить схему
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()">
                        🗑️ Очистить
                    </button>
                </div>

                <div class="examples-list">
                    <h3>📚 Примеры:</h3>
                    <div class="example-item" onclick="loadExample('ifElse')">
                        🔀 Условный оператор (If-Then-Else)
                    </div>
                    <div class="example-item" onclick="loadExample('loop')">
                        🔄 Цикл с предусловием (While)
                    </div>
                    <div class="example-item" onclick="loadExample('forLoop')">
                        ⏭️ Цикл со счетчиком (For)
                    </div>
                    <div class="example-item" onclick="loadExample('nested')">
                        🌲 Вложенные условия
                    </div>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="stats" class="stats"></div>
            </div>

            <div class="flowchart-panel">
                <h2 style="color: white; margin-bottom: 15px;">📊 Блок-схема алгоритма</h2>
                <div class="flowchart-container">
                    <svg id="flowchartSvg" width="1000" height="600">
                        <defs>
                            <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                                <polygon points="0 0, 10 5, 0 10" fill="#4a4a6a" />
                            </marker>
                        </defs>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        class PascalParser {
            constructor() {
                this.nodes = [];
                this.edges = [];
                this.nodeCounter = 0;
                this.currentX = 100;
                this.currentY = 50;
                this.level = 0;
                this.conditions = [];
            }

            parse(code) {
                this.nodes = [];
                this.edges = [];
                this.nodeCounter = 0;
                this.currentX = 500;
                this.currentY = 50;
                this.level = 0;
                this.conditions = [];

                const lines = code.split('\n');
                let inBegin = false;
                let programStarted = false;

                // Добавляем начальный блок
                const startNode = this.addNode('start', 'НАЧАЛО', this.currentX, this.currentY);
                this.currentY += 80;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim().toLowerCase();
                    
                    if (line === '' || line.startsWith('//') || line.startsWith('program') || line.startsWith('var')) {
                        continue;
                    }

                    if (line.includes('begin')) {
                        inBegin = true;
                        programStarted = true;
                        continue;
                    }

                    if (line.includes('end.') || (line.includes('end') && !line.includes('begin'))) {
                        break;
                    }

                    if (!inBegin) continue;

                    // Парсинг различных конструкций
                    if (line.includes('writeln') || line.includes('write')) {
                        const node = this.addNode('output', 'Вывод данных', this.currentX, this.currentY);
                        this.currentY += 80;
                    }
                    else if (line.includes('readln') || line.includes('read')) {
                        const node = this.addNode('input', 'Ввод данных', this.currentX, this.currentY);
                        this.currentY += 80;
                    }
                    else if (line.includes('if')) {
                        const condition = line.substring(line.indexOf('if') + 2, line.indexOf('then')).trim();
                        const node = this.addNode('condition', condition, this.currentX, this.currentY);
                        
                        // Сохраняем информацию о условии для последующего соединения
                        this.conditions.push({
                            node: node,
                            y: this.currentY,
                            trueX: this.currentX - 150,
                            falseX: this.currentX + 150,
                            level: this.level++
                        });
                        
                        this.currentY += 80;
                    }
                    else if (line.includes('else')) {
                        // Пропускаем, обрабатывается в условии
                        continue;
                    }
                    else if (line.includes(':=')) {
                        const parts = line.split(':=');
                        const node = this.addNode('process', `${parts[0].trim()} := ...`, this.currentX, this.currentY);
                        this.currentY += 80;
                    }
                    else if (line.includes('for') || line.includes('while') || line.includes('repeat')) {
                        const node = this.addNode('loop', 'Цикл', this.currentX, this.currentY);
                        this.currentY += 80;
                    }
                }

                // Добавляем конечный блок
                const endNode = this.addNode('end', 'КОНЕЦ', this.currentX, this.currentY);
                
                // Создаем связи с учетом ветвлений
                this.createSmartEdges();
                
                return { nodes: this.nodes, edges: this.edges };
            }

            addNode(type, label, x, y) {
                const node = {
                    id: `node_${this.nodeCounter++}`,
                    type: type,
                    label: label,
                    x: x,
                    y: y,
                    width: this.getNodeWidth(type),
                    height: this.getNodeHeight(type),
                    trueBranch: null,
                    falseBranch: null
                };
                this.nodes.push(node);
                return node;
            }

            getNodeWidth(type) {
                switch(type) {
                    case 'condition': return 140;
                    case 'start':
                    case 'end': return 100;
                    case 'input':
                    case 'output': return 120;
                    default: return 120;
                }
            }

            getNodeHeight(type) {
                switch(type) {
                    case 'condition': return 70;
                    case 'start':
                    case 'end': return 40;
                    default: return 50;
                }
            }

            createSmartEdges() {
                for (let i = 0; i < this.nodes.length - 1; i++) {
                    const currentNode = this.nodes[i];
                    const nextNode = this.nodes[i + 1];
                    
                    if (currentNode.type === 'condition') {
                        // Для условия создаем две ветки
                        const trueNode = this.findNextNode(i, true);
                        const falseNode = this.findNextNode(i, false);
                        
                        if (trueNode) {
                            this.edges.push({
                                from: currentNode.id,
                                to: trueNode.id,
                                type: 'true',
                                label: 'Да'
                            });
                        }
                        
                        if (falseNode) {
                            this.edges.push({
                                from: currentNode.id,
                                to: falseNode.id,
                                type: 'false',
                                label: 'Нет'
                            });
                        }
                        
                        // Пропускаем следующий узел, так как он уже обработан
                        i++;
                    } else {
                        // Обычная связь
                        this.edges.push({
                            from: currentNode.id,
                            to: nextNode.id,
                            type: 'normal',
                            label: ''
                        });
                    }
                }
            }

            findNextNode(currentIndex, isTrue) {
                // Поиск следующего узла для ветки условия
                for (let i = currentIndex + 1; i < this.nodes.length; i++) {
                    const node = this.nodes[i];
                    if (node.type !== 'condition') {
                        return node;
                    }
                }
                return null;
            }
        }

        class FlowchartRenderer {
            constructor(svgId) {
                this.svg = document.getElementById(svgId);
                this.nodeWidth = 120;
                this.nodeHeight = 50;
                this.conditionWidth = 140;
                this.conditionHeight = 70;
            }

            render(nodes, edges) {
                // Очищаем SVG
                while (this.svg.firstChild) {
                    this.svg.removeChild(this.svg.firstChild);
                }

                // Восстанавливаем defs
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', 'arrowhead');
                marker.setAttribute('markerWidth', '10');
                marker.setAttribute('markerHeight', '10');
                marker.setAttribute('refX', '9');
                marker.setAttribute('refY', '5');
                marker.setAttribute('orient', 'auto');
                
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', '0 0, 10 5, 0 10');
                polygon.setAttribute('fill', '#4a4a6a');
                
                marker.appendChild(polygon);
                defs.appendChild(marker);
                this.svg.appendChild(defs);

                // Рисуем соединения
                edges.forEach(edge => {
                    const fromNode = nodes.find(n => n.id === edge.from);
                    const toNode = nodes.find(n => n.id === edge.to);
                    
                    if (fromNode && toNode) {
                        this.drawEdge(fromNode, toNode, edge.type, edge.label);
                    }
                });

                // Рисуем узлы
                nodes.forEach(node => {
                    this.drawNode(node);
                });

                // Устанавливаем размер SVG
                const maxY = Math.max(...nodes.map(n => n.y + n.height)) + 50;
                const maxX = Math.max(...nodes.map(n => n.x + n.width)) + 50;
                this.svg.setAttribute('height', maxY);
                this.svg.setAttribute('width', Math.max(1000, maxX));
            }

            drawNode(node) {
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                group.setAttribute('class', 'node');
                group.setAttribute('data-id', node.id);

                let shape;
                
                switch(node.type) {
                    case 'start':
                    case 'end':
                        // Овал для начала/конца
                        shape = this.createEllipse(node);
                        break;
                    case 'condition':
                        // Ромб для условия
                        shape = this.createDiamond(node);
                        break;
                    case 'input':
                    case 'output':
                        // Параллелограмм для ввода/вывода
                        shape = this.createParallelogram(node);
                        break;
                    default:
                        // Прямоугольник для процессов
                        shape = this.createRectangle(node);
                }

                // Добавляем класс для цвета
                let colorClass = 'process-node';
                if (node.type === 'start') colorClass = 'start-node';
                else if (node.type === 'end') colorClass = 'end-node';
                else if (node.type === 'condition') colorClass = 'decision-node';
                else if (node.type === 'input') colorClass = 'input-node';
                else if (node.type === 'output') colorClass = 'output-node';
                else if (node.type === 'loop') colorClass = 'loop-node';
                
                shape.setAttribute('class', colorClass);
                group.appendChild(shape);

                // Текст
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('class', 'node-text');
                
                // Позиционирование текста в зависимости от формы
                if (node.type === 'condition') {
                    text.setAttribute('x', node.x + node.width/2);
                    text.setAttribute('y', node.y + node.height/2);
                } else if (node.type === 'input' || node.type === 'output') {
                    text.setAttribute('x', node.x + node.width/2);
                    text.setAttribute('y', node.y + node.height/2);
                } else {
                    text.setAttribute('x', node.x + node.width/2);
                    text.setAttribute('y', node.y + node.height/2);
                }
                
                text.textContent = this.shortenText(node.label, 20);
                group.appendChild(text);

                this.svg.appendChild(group);
            }

            createRectangle(node) {
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', node.x);
                rect.setAttribute('y', node.y);
                rect.setAttribute('width', node.width);
                rect.setAttribute('height', node.height);
                rect.setAttribute('rx', '5');
                rect.setAttribute('ry', '5');
                return rect;
            }

            createEllipse(node) {
                const ellipse = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                ellipse.setAttribute('cx', node.x + node.width/2);
                ellipse.setAttribute('cy', node.y + node.height/2);
                ellipse.setAttribute('rx', node.width/2);
                ellipse.setAttribute('ry', node.height/2);
                return ellipse;
            }

            createDiamond(node) {
                const points = [
                    [node.x + node.width/2, node.y],
                    [node.x + node.width, node.y + node.height/2],
                    [node.x + node.width/2, node.y + node.height],
                    [node.x, node.y + node.height/2]
                ];
                
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', points.map(p => p.join(',')).join(' '));
                return polygon;
            }

            createParallelogram(node) {
                const skew = 15;
                const points = [
                    [node.x + skew, node.y],
                    [node.x + node.width + skew, node.y],
                    [node.x + node.width, node.y + node.height],
                    [node.x, node.y + node.height]
                ];
                
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', points.map(p => p.join(',')).join(' '));
                return polygon;
            }

            drawEdge(fromNode, toNode, type, label) {
                let startX, startY, endX, endY;
                
                // Определяем точки соединения в зависимости от типа узлов
                if (fromNode.type === 'condition') {
                    if (type === 'true') {
                        startX = fromNode.x + fromNode.width * 0.75;
                        startY = fromNode.y + fromNode.height * 0.5;
                        endX = toNode.x;
                        endY = toNode.y + toNode.height/2;
                    } else {
                        startX = fromNode.x + fromNode.width * 0.25;
                        startY = fromNode.y + fromNode.height * 0.5;
                        endX = toNode.x + toNode.width;
                        endY = toNode.y + toNode.height/2;
                    }
                } else {
                    startX = fromNode.x + fromNode.width/2;
                    startY = fromNode.y + fromNode.height;
                    endX = toNode.x + toNode.width/2;
                    endY = toNode.y;
                }

                // Рисуем линию
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', startX);
                line.setAttribute('y1', startY);
                line.setAttribute('x2', endX);
                line.setAttribute('y2', endY);
                line.setAttribute('class', 'edge');
                
                this.svg.appendChild(line);

                // Добавляем метку для веток условия
                if (label) {
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', (startX + endX) / 2);
                    text.setAttribute('y', (startY + endY) / 2 - 5);
                    text.setAttribute('class', 'edge-label');
                    text.textContent = label;
                    this.svg.appendChild(text);
                }
            }

            shortenText(text, maxLength) {
                if (text.length > maxLength) {
                    return text.substring(0, maxLength) + '...';
                }
                return text;
            }
        }

        // Инициализация
        const parser = new PascalParser();
        const renderer = new FlowchartRenderer('flowchartSvg');

        function generateFlowchart() {
            const code = document.getElementById('pascalCode').value;
            const errorDiv = document.getElementById('errorMessage');
            const statsDiv = document.getElementById('stats');
            
            try {
                const { nodes, edges } = parser.parse(code);
                renderer.render(nodes, edges);
                
                statsDiv.innerHTML = `
                    <strong>📊 Статистика:</strong><br>
                    Блоков: ${nodes.length}<br>
                    Соединений: ${edges.length}<br>
                    Условных операторов: ${nodes.filter(n => n.type === 'condition').length}
                `;
                
                errorDiv.style.display = 'none';
            } catch (error) {
                errorDiv.textContent = 'Ошибка: ' + error.message;
                errorDiv.style.display = 'block';
            }
        }

        function clearAll() {
            document.getElementById('pascalCode').value = '';
            document.getElementById('stats').innerHTML = '';
            
            // Очищаем SVG
            const svg = document.getElementById('flowchartSvg');
            while (svg.firstChild) {
                svg.removeChild(svg.firstChild);
            }
            
            // Восстанавливаем defs
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '10');
            marker.setAttribute('markerHeight', '10');
            marker.setAttribute('refX', '9');
            marker.setAttribute('refY', '5');
            marker.setAttribute('orient', 'auto');
            
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '0 0, 10 5, 0 10');
            polygon.setAttribute('fill', '#4a4a6a');
            
            marker.appendChild(polygon);
            defs.appendChild(marker);
            svg.appendChild(defs);
        }

        function loadExample(type) {
            let code = '';
            
            switch(type) {
                case 'ifElse':
                    code = `program IfElseExample;
var
  x: integer;
begin
  writeln('Введите число:');
  readln(x);
  
  if x > 0 then
  begin
    writeln('Число положительное');
    if x mod 2 = 0 then
      writeln('Число четное')
    else
      writeln('Число нечетное');
  end
  else
  begin
    writeln('Число отрицательное или ноль');
  end;
  
  readln;
end.`;
                    break;
                    
                case 'loop':
                    code = `program WhileLoop;
var
  i, sum: integer;
begin
  i := 1;
  sum := 0;
  
  while i <= 10 do
  begin
    sum := sum + i;
    i := i + 1;
  end;
  
  writeln('Сумма чисел от 1 до 10 = ', sum);
  readln;
end.`;
                    break;
                    
                case 'forLoop':
                    code = `program ForLoop;
var
  i, n, fact: integer;
begin
  writeln('Введите число:');
  readln(n);
  
  fact := 1;
  for i := 1 to n do
    fact := fact * i;
    
  writeln(n, '! = ', fact);
  readln;
end.`;
                    break;
                    
                case 'nested':
                    code = `program NestedConditions;
var
  a, b, c: integer;
begin
  writeln('Введите три числа:');
  readln(a, b, c);
  
  if a > b then
    if a > c then
      writeln('Максимальное число: ', a)
    else
      writeln('Максимальное число: ', c)
  else
    if b > c then
      writeln('Максимальное число: ', b)
    else
      writeln('Максимальное число: ', c);
  
  readln;
end.`;
                    break;
            }
            
            document.getElementById('pascalCode').value = code;
            generateFlowchart();
        }

        // Генерируем при загрузке
        window.onload = function() {
            generateFlowchart();
        };
    </script>
</body>
</html>
