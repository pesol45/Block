<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal Flowchart Compact</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        header { background: #202124; color: white; padding: 10px; text-align: center; }
        .content { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        textarea { width: 30%; background: #282c34; color: #abb2bf; padding: 15px; font-family: monospace; border-radius: 8px; border: none; }
        #diagram { flex: 1; background: white; border-radius: 8px; border: 1px solid #ccc; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .controls { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        button { padding: 10px 30px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>Pascal Flowchart Generator 9.0 (Compact)</header>
<div class="controls">
    <button onclick="generate()">ПОСТРОИТЬ КОМПАКТНУЮ СХЕМУ</button>
</div>

<div class="content">
    <textarea id="code">
program Task;
begin
  readln(x);
  if x > 6 then
    y := sqr(sin(sqrt(x))) + cos(sqrt(x))
  else if x <= 2 then
    y := 8 * (x * x * x) + 5 * sqr(x) - sin(2 * x)
  else
    writeln('Не определено');
  writeln(y);
end.</textarea>
    <div id="diagram">
        <div id="graph" class="mermaid"></div>
    </div>
</div>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', flowchart: { rankSpacing: 30, nodeSpacing: 50 } });

    function clean(t) {
        return t.replace(/;/g, '').replace(/'/g, '').replace(/\(/g, '[').replace(/\)/g, ']').trim();
    }

    async function generate() {
        const input = document.getElementById('code').value;
        const out = document.getElementById('graph');
        
        const lines = input.split('\n')
            .map(l => l.trim())
            .filter(l => l !== '' && !l.toLowerCase().includes('program') && !l.toLowerCase().includes('var') && l.toLowerCase() !== 'begin' && !l.toLowerCase().startsWith('end'));

        let m = "graph TD\n  Start([Начало])\n";
        let lastNode = "Start";
        let nodeIdx = 0;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let low = line.toLowerCase();

            if (low.startsWith('if ') || (low.startsWith('else if'))) {
                let cond = line.replace(/if|then|else/gi, '').trim();
                let ifId = `if${nodeIdx++}`;
                let thenId = `then${nodeIdx++}`;
                let nextMergeId = `m${nodeIdx++}`;

                m += `  ${lastNode} --> ${ifId}{"${clean(cond)}"}\n`;
                // Ветка Да идет вбок (используем --> для вертикали, но Mermaid сам распределит при наличии веток)
                m += `  ${ifId} -- Да --> ${thenId}["${clean(lines[i+1])}"]\n`;
                m += `  ${thenId} --> ${nextMergeId}(( ))\n`;
                
                // Ветка Нет ведет к следующему узлу
                m += `  ${ifId} -- Нет --> `;
                lastNode = ifId; // Следующая итерация (else или следующий блок) пойдет от ветки "Нет"
                
                // Если следующий блок - это просто действие в Else (не If)
                if (lines[i+2] && lines[i+2].toLowerCase().startsWith('else') && !lines[i+2].toLowerCase().includes('if')) {
                    let elseId = `else${nodeIdx++}`;
                    m += `${elseId}["${clean(lines[i+3])}"]\n`;
                    m += `  ${elseId} --> ${nextMergeId}\n`;
                    lastNode = nextMergeId;
                    i += 3; 
                } else {
                    // Если там еще один Else If, оставляем lastNode на ifId и продолжаем
                    i++; 
                }
            } else {
                let sId = `s${nodeIdx++}`;
                m += `  ${lastNode} --> ${sId}["${clean(line)}"]\n`;
                lastNode = sId;
            }
        }

        m += `\n  ${lastNode} --> End([Конец])`;

        out.removeAttribute('data-processed');
        out.innerHTML = m;
        await mermaid.run({ nodes: [out] });
    }
</script>
</body>
</html>
