<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамический сайт | Управление контентом</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Публичный контент */
        .public-content {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
        }

        .public-content h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .content-card {
            background: #f8f9fa;
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border-left: 4px solid #764ba2;
            transition: transform 0.2s;
        }

        .content-card:hover {
            transform: translateX(5px);
        }

        .content-card h3 {
            color: #333;
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }

        .content-card p {
            color: #555;
            line-height: 1.5;
        }

        .content-card small {
            color: #999;
            font-size: 0.75rem;
            display: block;
            margin-top: 0.5rem;
        }

        /* Админ-панель */
        .admin-panel {
            background: #1e1e2f;
            border-radius: 1.5rem;
            padding: 1.5rem;
            color: white;
            margin-top: 1.5rem;
        }

        .admin-panel h2 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .admin-panel h3 {
            margin: 1rem 0 0.5rem;
            font-size: 1.1rem;
            color: #aaa;
        }

        .admin-form {
            background: #2a2a3b;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        .admin-form input,
        .admin-form textarea {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-family: inherit;
            background: #3a3a4f;
            color: white;
            resize: vertical;
        }

        .admin-form input::placeholder,
        .admin-form textarea::placeholder {
            color: #888;
        }

        .admin-form input:focus,
        .admin-form textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px #764ba2;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            margin-left: 0.5rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-logout {
            background: #444;
            margin-top: 1rem;
        }

        .admin-item {
            background: #2a2a3b;
            border-radius: 0.75rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .admin-item-info {
            flex: 1;
        }

        .admin-item-info strong {
            color: #fff;
        }

        .admin-item-info p {
            color: #bbb;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        /* Модальное окно входа */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px -12px black;
        }

        .login-box h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .login-box p {
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-box input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 0.75rem;
            font-size: 1rem;
        }

        .error-msg {
            color: #e74c3c;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }

        .admin-badge {
            background: #764ba2;
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            margin-left: 1rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Публичная часть -->
    <div class="public-content">
        <h1>✨ Динамический контент <span id="adminBadge" class="admin-badge hidden">ADMIN MODE</span></h1>
        <div id="contentList">
            <div class="loading">Загрузка...</div>
        </div>
    </div>

    <!-- Админ-панель (скрыта по умолчанию) -->
    <div id="adminPanel" class="admin-panel hidden">
        <h2>🔧 Админ-панель</h2>
        <div class="admin-form">
            <h3>➕ Создать новый блок</h3>
            <input type="text" id="blockTitle" placeholder="Заголовок">
            <textarea id="blockContent" rows="3" placeholder="Содержание..."></textarea>
            <button id="addBlockBtn">📌 Добавить</button>
        </div>
        <h3>📋 Управление блоками</h3>
        <div id="adminBlocksList"></div>
        <button id="logoutBtn" class="btn-logout">🚪 Выйти из админ-панели</button>
    </div>
    <footer>Контент управляется через админ-панель</footer>
</div>

<!-- Модальное окно входа -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>🔐 Вход в админ-панель</h3>
        <p>Введите пароль для доступа</p>
        <input type="password" id="adminPassword" placeholder="Пароль">
        <button id="loginBtn">Войти</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<script>
    // ========== Firebase Конфигурация ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCaWv0A5OCgdAgUFn9lMzQ_tVaga0scpQA",
        authDomain: "site-5378a.firebaseapp.com",
        projectId: "site-5378a",
        storageBucket: "site-5378a.firebasestorage.app",
        messagingSenderId: "1080576728275",
        appId: "1:1080576728275:web:efdb524baf64d8bd9ac826"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ========== НАСТРОЙКИ ДОСТУПА ==========
    // Пароль для входа в админку (можно изменить)
    const ADMIN_PASSWORD = "admin123";
    
    // Секретный путь — если URL заканчивается на /admin, показываем форму входа
    // Для обычного доступа: https://pesol45.github.io/Block/
    // Для админ-панели: https://pesol45.github.io/Block/admin
    
    let isAdmin = false;

    // ========== Функции ==========
    
    // Экранирование HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Загрузка публичного контента
    async function loadPublicContent() {
        try {
            const snapshot = await db.collection('site_content')
                .orderBy('createdAt', 'desc')
                .get();
            
            const container = document.getElementById('contentList');
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="content-card">Пока нет контента. Зайдите в админ-панель, чтобы добавить.</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `
                    <div class="content-card">
                        <h3>${escapeHtml(data.title)}</h3>
                        <p>${escapeHtml(data.content)}</p>
                        <small>📅 ${data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString('ru-RU') : 'только что'}</small>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            document.getElementById('contentList').innerHTML = '<div class="content-card">❌ Ошибка загрузки контента</div>';
        }
    }

    // Загрузка для админа (с кнопками удаления)
    async function loadAdminBlocks() {
        if (!isAdmin) return;
        
        try {
            const snapshot = await db.collection('site_content')
                .orderBy('createdAt', 'desc')
                .get();
            
            const container = document.getElementById('adminBlocksList');
            
            if (snapshot.empty) {
                container.innerHTML = '<div style="color:#aaa;">Нет блоков. Создайте первый!</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                html += `
                    <div class="admin-item" data-id="${doc.id}">
                        <div class="admin-item-info">
                            <strong>${escapeHtml(data.title)}</strong>
                            <p>${escapeHtml(data.content.substring(0, 100))}${data.content.length > 100 ? '...' : ''}</p>
                        </div>
                        <button class="btn-danger delete-btn" data-id="${doc.id}">🗑 Удалить</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            // Навешиваем обработчики на кнопки удаления
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteBlock(btn.dataset.id));
            });
        } catch (error) {
            console.error('Ошибка загрузки админ-панели:', error);
        }
    }

    // Добавление блока
    async function addBlock() {
        const title = document.getElementById('blockTitle').value.trim();
        const content = document.getElementById('blockContent').value.trim();
        
        if (!title || !content) {
            alert('Заполните и заголовок, и содержание');
            return;
        }
        
        try {
            await db.collection('site_content').add({
                title: title,
                content: content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdBy: 'admin'
            });
            
            // Очищаем поля
            document.getElementById('blockTitle').value = '';
            document.getElementById('blockContent').value = '';
            
            // Обновляем оба вида
            await loadPublicContent();
            await loadAdminBlocks();
        } catch (error) {
            console.error('Ошибка добавления:', error);
            alert('Ошибка при добавлении блока');
        }
    }

    // Удаление блока
    async function deleteBlock(id) {
        if (!confirm('Удалить этот блок? Отменить будет нельзя.')) return;
        
        try {
            await db.collection('site_content').doc(id).delete();
            await loadPublicContent();
            await loadAdminBlocks();
        } catch (error) {
            console.error('Ошибка удаления:', error);
            alert('Ошибка при удалении');
        }
    }

    // ========== Логика входа через URL ==========
    
    // Проверяем, нужно ли показать админ-панель
    function checkAdminAccess() {
        // Получаем текущий путь (то, что после домена)
        // Например: https://pesol45.github.io/Block/admin → path = "/Block/admin"
        // Нам нужно проверить, заканчивается ли путь на /admin
        const path = window.location.pathname;
        
        // Проверяем, есть ли /admin в конце пути (без учёта слеша в конце)
        const isAdminPath = path.endsWith('/admin') || path === '/admin';
        
        if (isAdminPath) {
            // Показываем форму входа
            document.getElementById('loginOverlay').classList.remove('hidden');
        } else {
            // Обычный режим — скрываем всё админское
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminBadge').classList.add('hidden');
        }
    }
    
    // Вход с паролем
    function loginWithPassword() {
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        if (password === ADMIN_PASSWORD) {
            isAdmin = true;
            
            // Скрываем окно входа
            document.getElementById('loginOverlay').classList.add('hidden');
            // Показываем админ-панель
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminBadge').classList.remove('hidden');
            
            // Загружаем админские данные
            loadAdminBlocks();
            
            // Сохраняем сессию в sessionStorage (закроется при закрытии вкладки)
            sessionStorage.setItem('adminAuthenticated', 'true');
            
            // Меняем URL обратно на обычный (чтобы при обновлении не было путаницы)
            // Но оставляем возможность обновить страницу
            const newUrl = window.location.href.replace('/admin', '').replace(/\/$/, '');
            window.history.pushState({}, '', newUrl);
        } else {
            errorDiv.textContent = '❌ Неверный пароль';
            document.getElementById('adminPassword').value = '';
        }
    }
    
    // Выход из админки
    function logout() {
        isAdmin = false;
        sessionStorage.removeItem('adminAuthenticated');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('adminBadge').classList.add('hidden');
        
        // Возвращаемся на обычную версию
        const normalUrl = window.location.href.split('?')[0].replace('/admin', '').replace(/\/$/, '');
        window.location.href = normalUrl;
    }
    
    // Проверка сохранённой сессии
    function checkSession() {
        const savedSession = sessionStorage.getItem('adminAuthenticated');
        if (savedSession === 'true') {
            // Автоматически восстанавливаем админ-режим
            isAdmin = true;
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('adminBadge').classList.remove('hidden');
            document.getElementById('loginOverlay').classList.add('hidden');
            loadAdminBlocks();
        }
    }

    // ========== Инициализация ==========
    async function init() {
        // Сначала загружаем публичный контент (он нужен всем)
        await loadPublicContent();
        
        // Проверяем, не залогинены ли мы уже
        checkSession();
        
        // Проверяем URL и показываем форму входа если нужно
        checkAdminAccess();
        
        // Обработчики событий
        document.getElementById('loginBtn').onclick = loginWithPassword;
        document.getElementById('addBlockBtn').onclick = addBlock;
        document.getElementById('logoutBtn').onclick = logout;
        
        // Нажатие Enter в поле пароля
        document.getElementById('adminPassword').onkeypress = (e) => {
            if (e.key === 'Enter') loginWithPassword();
        };
    }
    
    init();
</script>
</body>
</html>
