<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Klutoist GOST Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">

    <textarea id="code" rows="10" style="width:100%;">
program primer1;
var i: integer; sum: real;
begin
  sum := 0;
  for i := 1 to 50 do
    sum := sum + 1/i;
  write(sum);
end.
    </textarea>
    <br>
    <button onclick="draw()">Создать по чертежу</button>

    <div id="graph" style="margin-top:20px;"></div>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        async function draw() {
            // Строим схему по твоему образцу:
            const graphDefinition = `
graph TD
    A([Начало]) --> B["sum := 0"]
    B --> C{{"i := 1 to 50"}}
    C -- "Да" --> D["sum := sum + 1/i"]
    D --> C
    C -- "Нет" --> E[/"Вывод sum"/]
    E --> F([Конец])
            `;

            const container = document.getElementById('graph');
            container.innerHTML = \`<pre class="mermaid">\${graphDefinition}</pre>\`;
            await mermaid.run();
        }
    </script>
</body>
</html>
