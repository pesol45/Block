<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой автопарк | Black Russia</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #0a0f1a 0%, #0c121c 100%); min-height: 100vh; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #ff3b3b, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .badge { display: inline-block; background: #2c3e2f; padding: 5px 12px; border-radius: 40px; font-size: 0.8rem; margin-top: 10px; }
        .badge.admin-mode { background: #8B4513; color: #FFD700; }
        
        .cars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; margin-top: 10px; margin-bottom: 20px; }
        .car-card { background: rgba(20, 30, 45, 0.9); backdrop-filter: blur(4px); border-radius: 28px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255, 100, 0, 0.3); transition: transform 0.2s; }
        .car-card:hover { transform: translateY(-5px); }
        
        /* ГАЛЕРЕЯ С ТОЧКАМИ */
        .gallery-wrapper { position: relative; margin-bottom: 15px; }
        .gallery-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; border-radius: 20px; scrollbar-width: none; }
        .gallery-container::-webkit-scrollbar { display: none; }
        .gallery-img { scroll-snap-align: start; flex-shrink: 0; width: 100%; height: 220px; object-fit: cover; background: #1a1f2a; border: 1px solid #ff8c42; border-radius: 20px; }
        .gallery-dots { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; cursor: pointer; transition: 0.2s; }
        .dot.active { background: white; transform: scale(1.2); }
        .gallery-counter { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; pointer-events: none; z-index: 5; }
        
        .add-photo-btn { margin-top: 8px; background: #3a7ca5; border: none; color: white; padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; cursor: pointer; width: 100%; }
        
        .car-name { font-size: 1.6rem; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 2px solid #ff5e00; padding-bottom: 8px; margin-bottom: 15px; }
        .car-plate { background: #1a1a2a; padding: 4px 10px; border-radius: 12px; font-family: monospace; font-size: 0.8rem; border: 1px solid #ffaa44; color: #ffaa44; margin-top: 5px; display: inline-block; }
        .specs { background: #00000055; border-radius: 20px; padding: 12px; margin: 10px 0; }
        .spec-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ff8c4233; }
        .price { color: #ffaa33; font-weight: bold; }
        .nitro-badge { background: #ff6600; color: #000; font-weight: bold; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; margin-left: 8px; }
        .nitro-x2 { background: #1a3a1a; color: #44ff44; }
        .nitro-x5 { background: #3a2a1a; color: #ffaa44; }
        .nitro-x10 { background: #3a1a1a; color: #ff4444; }
        .tune-tag { background: #2c5a7a; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.65rem; margin: 2px; display: inline-block; }
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .edit-btn, .delete-btn { flex: 1; padding: 10px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
        .edit-btn { background: #3a7ca5; color: white; }
        .delete-btn { background: #8b2c2c; color: white; }
        
        .admin-panel { background: #10161fe6; border-radius: 32px; padding: 20px; margin-bottom: 30px; border: 2px solid #ff7b2c; }
        .admin-form { display: flex; flex-direction: column; gap: 12px; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 140px; }
        .form-group label { font-size: 0.7rem; color: #ffaa66; display: block; margin-bottom: 4px; }
        .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 8px 12px; border-radius: 30px; border: none; background: #1e2a36; color: white; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; background: #1e2a36; padding: 8px 12px; border-radius: 40px; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; }
        .admin-form button { background: #ff7b2c; padding: 10px; border-radius: 40px; border: none; color: white; font-weight: bold; cursor: pointer; }
        
        .empty-state { text-align: center; padding: 60px; color: #aaa; }
        footer { margin-top: 20px; text-align: center; font-size: 0.7rem; opacity: 0.6; padding-bottom: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1a2a2a; padding: 25px; border-radius: 32px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .error-border { border: 1px solid #ff4444 !important; background: #3a1a1a !important; }
        .info-text { font-size: 0.7rem; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏁 Мой автопарк | BLACK RUSSIA 🏎️</h1>
        <div id="adminBadge" class="badge">👤 Гость</div>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div id="adminZone" style="display: none;">
        <div class="admin-panel">
            <h3>🔧 Админ-панель</h3>
            <div class="admin-form">
                <div class="form-row">
                    <div class="form-group" style="flex:2;"><input type="text" id="carName" placeholder="Название машины"></div>
                    <div class="form-group"><input type="text" id="carImage" placeholder="Фото (ссылки через |)"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><input type="number" id="price" placeholder="Цена"></div>
                    <div class="form-group"><input type="number" id="accelerationNoNitro" placeholder="Разгон без нитро" step="0.1"></div>
                    <div class="form-group"><input type="number" id="accelerationWithNitro" placeholder="Разгон с нитро" step="0.1"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><input type="number" id="topSpeed" placeholder="Максималка"></div>
                    <div class="form-group">
                        <select id="nitroType">
                            <option value="none">❌ Без нитро</option>
                            <option value="x2">🔥 x2</option>
                            <option value="x5">💥 x5</option>
                            <option value="x10">⚡ x10</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <select id="plateCountry">
                            <option value="none">🌍 Без номера</option>
                            <option value="ru">🇷🇺 Россия</option>
                            <option value="ua">🇺🇦 Украина</option>
                            <option value="by">🇧🇾 Беларусь</option>
                            <option value="kz">🇰🇿 Казахстан</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:2;">
                        <input type="text" id="plateNumber" placeholder="Гос номер">
                        <div class="info-text" id="plateHint">Формат: А123ВС 116</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Прошивки</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" value="Спорт"> 🏁 Спорт</label>
                            <label><input type="checkbox" value="Спорт+"> 🔥 Спорт+</label>
                            <label><input type="checkbox" value="Комфорт"> ☁️ Комфорт</label>
                            <label><input type="checkbox" value="Дрифт"> 💨 Дрифт</label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><textarea id="otherSpecs" rows="2" placeholder="Доп. характеристики"></textarea></div>
                </div>
                <button id="createCarBtn">➕ Добавить машину</button>
            </div>
        </div>
    </div>

    <div id="carsContainer" class="cars-grid">
        <div class="empty-state">🏎️ Загрузка...</div>
    </div>
    <footer>🔐 Админ: ?key=14881161 | Листай фото, точки показывают текущее фото</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaWv0A5OCgdAgUFn9lMzQ_tVaga0scpQA",
        authDomain: "site-5378a.firebaseapp.com",
        projectId: "site-5378a",
        storageBucket: "site-5378a.firebasestorage.app",
        messagingSenderId: "1080576728275",
        appId: "1:1080576728275:web:efdb524baf64d8bd9ac826"
    };

    let database, carsRef;
    try {
        const app = firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        carsRef = database.ref('cars');
    } catch(e) { console.error(e); }

    const ADMIN_KEY = "14881161";
    let isAdminMode = false;
    let allCars = [];

    // ГОСТ валидация номеров
    function validatePlateNumber(country, number) {
        if (!number || country === 'none') return true;
        const clean = number.toUpperCase().replace(/\s/g, '');
        
        if (country === 'ru') {
            // Русский ГОСТ: Буква 3 цифры 2 буквы | регион (2-3 цифры)
            const ruPattern = /^[АВЕКМНОРСТУХABEKMHOPCTYX]{1}\d{3}[АВЕКМНОРСТУХABEKMHOPCTYX]{2}\d{2,3}$/i;
            return ruPattern.test(clean);
        }
        else if (country === 'ua') {
            // Украинский: AA 1234 BB или AA 1234 BB регион (2 цифры)
            const uaPattern = /^[A-Z]{2}\d{4}[A-Z]{2}\d{2}$/i;
            return uaPattern.test(clean);
        }
        else if (country === 'by') {
            // Белорусский: 1234 AB-7 или A 1234 BC-7
            const byPattern = /^[A-Z]{0,2}\d{4}[A-Z]{2}\d{1,2}$/i;
            return byPattern.test(clean) || clean.length >= 5;
        }
        else if (country === 'kz') {
            // Казахстанский: 123 ABC 01 или ABC 123
            const kzPattern = /^[A-Z]{3}\d{3}$|^\d{3}[A-Z]{3}$/i;
            return kzPattern.test(clean);
        }
        return true;
    }

    function formatPlateForDisplay(country, number) {
        if (!number || country === 'none') return number;
        const clean = number.toUpperCase();
        if (country === 'ru' && clean.length >= 6) {
            return `${clean.substring(0,1)}${clean.substring(1,4)}${clean.substring(4,6)} ${clean.substring(6)}`;
        }
        return clean;
    }

    function getCountryFlag(code) { const f = { ua:"🇺🇦", by:"🇧🇾", ru:"🇷🇺", kz:"🇰🇿" }; return f[code] || "🌍"; }
    function getNitroClass(t) { return t === 'x2' ? 'nitro-x2' : t === 'x5' ? 'nitro-x5' : t === 'x10' ? 'nitro-x10' : ''; }
    function getNitroText(t) { return t === 'x2' ? '🔥 x2' : t === 'x5' ? '💥 x5' : t === 'x10' ? '⚡ x10' : '❌ Нет'; }
    function formatPrice(p) { return p ? p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " ₽" : "?"; }
    function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    function showMessage(t, type="error") { 
        let d = document.createElement('div'); 
        d.style.cssText = `position:fixed;bottom:80px;right:20px;background:${type==='success'?'#00aa55':'#ff4444'};color:white;padding:10px 20px;border-radius:40px;z-index:9999`; 
        d.textContent = t; 
        document.body.appendChild(d); 
        setTimeout(()=>d.remove(),3000); 
    }

    function checkAdminAccess() {
        let urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') === ADMIN_KEY) {
            isAdminMode = true;
            document.getElementById('adminZone').style.display = 'block';
            document.getElementById('adminBadge').innerHTML = '👑 АДМИН';
            document.getElementById('adminBadge').classList.add('admin-mode');
        } else {
            isAdminMode = false;
            document.getElementById('adminZone').style.display = 'none';
            document.getElementById('adminBadge').innerHTML = '👤 Гость';
        }
        renderCars();
    }

    function getImageUrls(imageField) {
        if (!imageField) return ['https://via.placeholder.com/400x200?text=No+Image'];
        if (imageField.includes('|')) {
            return imageField.split('|').map(url => url.trim()).filter(url => url);
        }
        return [imageField];
    }

    // Инициализация галереи с точками
    function initGallery(cardId, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        const dotsContainer = container.parentElement?.querySelector('.gallery-dots');
        if (!dotsContainer) return;
        
        const updateActiveDot = () => {
            const scrollLeft = container.scrollLeft;
            const scrollWidth = container.scrollWidth;
            const clientWidth = container.clientWidth;
            const activeIndex = Math.round((scrollLeft / (scrollWidth - clientWidth)) * (dotsContainer.children.length - 1)) || 0;
            
            Array.from(dotsContainer.children).forEach((dot, idx) => {
                if (idx === activeIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        };
        
        container.addEventListener('scroll', updateActiveDot);
        setTimeout(updateActiveDot, 100);
        
        Array.from(dotsContainer.children).forEach((dot, idx) => {
            dot.addEventListener('click', () => {
                const scrollAmount = (container.scrollWidth / dotsContainer.children.length) * idx;
                container.scrollTo({ left: scrollAmount, behavior: 'smooth' });
            });
        });
    }

    function renderCars() {
        let container = document.getElementById('carsContainer');
        if (!allCars.length) { container.innerHTML = '<div class="empty-state">🏎️ Нет машин</div>'; return; }
        container.innerHTML = '';
        
        allCars.forEach(car => {
            let imageUrls = getImageUrls(car.imageUrl);
            let tuneHtml = car.tunes?.length ? `<div class="spec-item"><strong>🔧 Прошивки:</strong><div>${car.tunes.map(t=>`<span class="tune-tag">${escapeHtml(t)}</span>`).join('')}</div></div>` : '';
            
            let displayPlate = '';
            if (car.plateCountry && car.plateNumber && car.plateCountry !== 'none') {
                let formatted = formatPlateForDisplay(car.plateCountry, car.plateNumber);
                displayPlate = `<div class="car-plate">${getCountryFlag(car.plateCountry)} ${escapeHtml(formatted)}</div>`;
            }
            
            let dotsHtml = '';
            if (imageUrls.length > 1) {
                dotsHtml = `<div class="gallery-dots">${imageUrls.map((_, idx) => `<div class="dot ${idx === 0 ? 'active' : ''}" data-idx="${idx}"></div>`).join('')}</div>`;
            }
            
            let galleryId = `gallery-${car.id}-${Date.now()}`;
            let wrapperId = `wrapper-${car.id}-${Date.now()}`;
            
            let addPhotoBtn = '';
            if (isAdminMode) {
                addPhotoBtn = `<button class="add-photo-btn" data-id="${car.id}" data-current="${escapeHtml(car.imageUrl || '')}">➕ Добавить фото</button>`;
            }
            
            let card = document.createElement('div');
            card.className = 'car-card';
            card.innerHTML = `
                <div class="gallery-wrapper" id="${wrapperId}">
                    <div class="gallery-container" id="${galleryId}">
                        ${imageUrls.map((url, idx) => `<img class="gallery-img" src="${escapeHtml(url)}" onerror="this.src='https://via.placeholder.com/400x200?text=Error'" loading="lazy" data-index="${idx}">`).join('')}
                    </div>
                    ${dotsHtml}
                    <div class="gallery-counter">📸 ${imageUrls.length}</div>
                </div>
                ${addPhotoBtn}
                <div class="car-name">
                    <span>${escapeHtml(car.name)}</span>
                    ${car.nitroType !== 'none' ? `<span class="nitro-badge ${getNitroClass(car.nitroType)}">${getNitroText(car.nitroType)}</span>` : ''}
                </div>
                ${displayPlate}
                <div class="specs">
                    <div class="spec-item"><strong>💰 Цена:</strong><span class="price">${formatPrice(car.price)}</span></div>
                    <div class="spec-item"><strong>🏎️ Разгон 0-100:</strong><span>без нитро: ${car.accelerationNoNitro ?? '?'} сек | с нитро: ${car.accelerationWithNitro ?? '?'} сек</span></div>
                    <div class="spec-item"><strong>📈 Максималка:</strong><span>${car.topSpeed ?? '?'} км/ч</span></div>
                    ${car.nitroType !== 'none' ? `<div class="spec-item"><strong>💨 Нитро:</strong><span class="${getNitroClass(car.nitroType)}">${getNitroText(car.nitroType)}</span></div>` : ''}
                    ${tuneHtml}
                    ${car.otherSpecs ? `<div class="spec-item"><strong>📝 Характеристики:</strong><br>${escapeHtml(car.otherSpecs)}</div>` : ''}
                </div>
                ${isAdminMode ? `<div class="action-buttons"><button class="edit-btn" data-id="${car.id}">✏️ Ред.</button><button class="delete-btn" data-id="${car.id}">🗑 Удал.</button></div>` : ''}
            `;
            container.appendChild(card);
            
            // Инициализируем галерею после добавления в DOM
            setTimeout(() => initGallery(car.id, galleryId), 50);
        });
        
        if (isAdminMode) {
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => { let id = btn.getAttribute('data-id'); let car = allCars.find(c=>c.id===id); if(car) editCar(id,car); }));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => { let id = btn.getAttribute('data-id'); if(confirm('Удалить?')) carsRef.child(id).remove(); }));
            document.querySelectorAll('.add-photo-btn').forEach(btn => btn.addEventListener('click', (e) => {
                let id = btn.getAttribute('data-id');
                let current = btn.getAttribute('data-current');
                let newPhotoUrl = prompt("Введите ссылку на новое фото:", "");
                if (newPhotoUrl && newPhotoUrl.trim()) {
                    let newUrls = current ? current + '|' + newPhotoUrl.trim() : newPhotoUrl.trim();
                    carsRef.child(id).update({ imageUrl: newUrls }).then(() => showMessage("✅ Фото добавлено", "success")).catch(e => showMessage(e.message));
                }
            }));
        }
    }

    function editCar(id, data) {
        let tunesSet = new Set(data.tunes||[]);
        let modalDiv = document.createElement('div'); 
        modalDiv.className = 'modal-overlay';
        modalDiv.innerHTML = `<div class="modal-content"><h3>✏️ Редактировать</h3>
            <div class="admin-form">
                <input id="editName" value="${escapeHtml(data.name)}" placeholder="Название">
                <input id="editImg" value="${escapeHtml(data.imageUrl||'')}" placeholder="Фото (через |)">
                <input id="editPrice" type="number" value="${data.price||''}" placeholder="Цена">
                <input id="editAccNo" type="number" step="0.1" value="${data.accelerationNoNitro||''}" placeholder="Разгон без нитро">
                <input id="editAccWith" type="number" step="0.1" value="${data.accelerationWithNitro||''}" placeholder="Разгон с нитро">
                <input id="editTop" type="number" value="${data.topSpeed||''}" placeholder="Максималка">
                <select id="editNitro">
                    <option value="none" ${data.nitroType==='none'?'selected':''}>❌ Без нитро</option>
                    <option value="x2" ${data.nitroType==='x2'?'selected':''}>🔥 x2</option>
                    <option value="x5" ${data.nitroType==='x5'?'selected':''}>💥 x5</option>
                    <option value="x10" ${data.nitroType==='x10'?'selected':''}>⚡ x10</option>
                </select>
                <select id="editCountry">
                    <option value="none" ${data.plateCountry==='none'||!data.plateCountry?'selected':''}>🌍 Без номера</option>
                    <option value="ru" ${data.plateCountry==='ru'?'selected':''}>🇷🇺 Россия</option>
                    <option value="ua" ${data.plateCountry==='ua'?'selected':''}>🇺🇦 Украина</option>
                    <option value="by" ${data.plateCountry==='by'?'selected':''}>🇧🇾 Беларусь</option>
                    <option value="kz" ${data.plateCountry==='kz'?'selected':''}>🇰🇿 Казахстан</option>
                </select>
                <input id="editPlate" value="${escapeHtml(data.plateNumber||'')}" placeholder="Гос номер">
                <div class="checkbox-group">
                    <label><input type="checkbox" value="Спорт" ${tunesSet.has('Спорт')?'checked':''}> 🏁 Спорт</label>
                    <label><input type="checkbox" value="Спорт+" ${tunesSet.has('Спорт+')?'checked':''}> 🔥 Спорт+</label>
                    <label><input type="checkbox" value="Комфорт" ${tunesSet.has('Комфорт')?'checked':''}> ☁️ Комфорт</label>
                    <label><input type="checkbox" value="Дрифт" ${tunesSet.has('Дрифт')?'checked':''}> 💨 Дрифт</label>
                </div>
                <textarea id="editOther" rows="2">${escapeHtml(data.otherSpecs||'')}</textarea>
                <button id="saveEdit">💾 Сохранить</button>
                <button id="cancelEdit" class="close-btn">Отмена</button>
            </div></div>`;
        document.body.appendChild(modalDiv);
        
        // Валидация номера при редактировании
        let countrySelect = document.getElementById('editCountry');
        let plateInput = document.getElementById('editPlate');
        
        function validateAndHighlight() {
            let country = countrySelect.value;
            let plate = plateInput.value;
            if (!validatePlateNumber(country, plate)) {
                plateInput.classList.add('error-border');
                return false;
            }
            plateInput.classList.remove('error-border');
            return true;
        }
        
        countrySelect.addEventListener('change', validateAndHighlight);
        plateInput.addEventListener('input', validateAndHighlight);
        
        document.getElementById('saveEdit').onclick = () => {
            let country = countrySelect.value;
            let plate = plateInput.value.trim();
            if (!validatePlateNumber(country, plate)) {
                showMessage(`❌ Неверный формат номера для выбранной страны!`);
                return;
            }
            
            let newTunes = Array.from(document.querySelectorAll('#editName ~ .checkbox-group input:checked')).map(cb=>cb.value);
            let updated = { 
                name: document.getElementById('editName').value.trim(), 
                imageUrl: document.getElementById('editImg').value.trim(), 
                price: parseInt(document.getElementById('editPrice').value)||null, 
                accelerationNoNitro: parseFloat(document.getElementById('editAccNo').value)||null, 
                accelerationWithNitro: parseFloat(document.getElementById('editAccWith').value)||null, 
                topSpeed: parseInt(document.getElementById('editTop').value)||null, 
                nitroType: document.getElementById('editNitro').value, 
                plateCountry: country, 
                plateNumber: plate, 
                tunes: newTunes, 
                otherSpecs: document.getElementById('editOther').value.trim() 
            };
            if(!updated.name) { showMessage("❌ Введите название"); return; }
            carsRef.child(id).update(updated).then(()=>{ showMessage("✅ Обновлено","success"); modalDiv.remove(); }).catch(e=>showMessage(e.message));
        };
        document.getElementById('cancelEdit').onclick = () => modalDiv.remove();
    }

    function createCar() {
        if(!isAdminMode) return;
        
        let country = document.getElementById('plateCountry').value;
        let plate = document.getElementById('plateNumber').value.trim();
        
        if (!validatePlateNumber(country, plate)) {
            showMessage(`❌ Неверный формат номера для выбранной страны!`);
            document.getElementById('plateNumber').classList.add('error-border');
            return;
        }
        document.getElementById('plateNumber').classList.remove('error-border');
        
        let tunes = Array.from(document.querySelectorAll('#adminZone .checkbox-group input:checked')).map(cb=>cb.value);
        let newCar = { 
            name: document.getElementById('carName').value.trim(), 
            imageUrl: document.getElementById('carImage').value.trim(), 
            price: parseInt(document.getElementById('price').value)||null, 
            accelerationNoNitro: parseFloat(document.getElementById('accelerationNoNitro').value)||null, 
            accelerationWithNitro: parseFloat(document.getElementById('accelerationWithNitro').value)||null, 
            topSpeed: parseInt(document.getElementById('topSpeed').value)||null, 
            nitroType: document.getElementById('nitroType').value, 
            plateCountry: country, 
            plateNumber: plate, 
            tunes, 
            otherSpecs: document.getElementById('otherSpecs').value.trim(), 
            createdAt: firebase.database.ServerValue.TIMESTAMP 
        };
        if(!newCar.name) { showMessage("❌ Введите название"); return; }
        carsRef.push(newCar).then(() => { 
            showMessage("✅ Машина добавлена","success"); 
            document.getElementById('carName').value=''; 
            document.getElementById('carImage').value=''; 
            document.getElementById('price').value=''; 
            document.getElementById('accelerationNoNitro').value=''; 
            document.getElementById('accelerationWithNitro').value=''; 
            document.getElementById('topSpeed').value=''; 
            document.getElementById('plateNumber').value=''; 
            document.querySelectorAll('#adminZone .checkbox-group input').forEach(cb=>cb.checked=false); 
            document.getElementById('otherSpecs').value=''; 
        }).catch(e=>showMessage(e.message));
    }

    // Подсказка формата при смене страны
    function updatePlateHint() {
        let country = document.getElementById('plateCountry').value;
        let hint = document.getElementById('plateHint');
        let hints = {
            ru: '🇷🇺 Формат: А123ВС 116 (буква → 3 цифры → 2 буквы → регион)',
            ua: '🇺🇦 Формат: AA1234BB или AA1234BB 12',
            by: '🇧🇾 Формат: 1234 AB-7 или A1234BC',
            kz: '🇰🇿 Формат: ABC123 или 123ABC',
            none: '🌍 Без номера'
        };
        if (hint) hint.textContent = hints[country] || 'Введите гос номер';
    }

    function subscribeCars() { 
        if(carsRef) carsRef.on('value', snap => { 
            let d = snap.val(); 
            let list = []; 
            for(let k in d) list.push({id:k, ...d[k], tunes: d[k].tunes||[]}); 
            list.reverse(); 
            allCars = list; 
            renderCars(); 
        }); 
    }

    document.getElementById('createCarBtn')?.addEventListener('click', createCar);
    document.getElementById('plateCountry')?.addEventListener('change', updatePlateHint);
    document.getElementById('plateNumber')?.addEventListener('input', () => {
        document.getElementById('plateNumber')?.classList.remove('error-border');
    });
    
    subscribeCars();
    checkAdminAccess();
    updatePlateHint();
</script>
</body>
</html>
