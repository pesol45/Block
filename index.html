<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Media Storage</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .admin-panel { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 30px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 70%; border-radius: 4px; }
        button { padding: 10px 20px; background: #ce1126; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #ff0000; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .video-item { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; position: relative; }
        video { width: 100%; border-radius: 4px; background: #000; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.7); border: none; color: white; cursor: pointer; padding: 5px 10px; border-radius: 4px; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-panel">
        <h2>Добавить видео (Jack's Panel)</h2>
        <input type="text" id="videoUrl" placeholder="Вставь ссылку на .mp4 или страницу">
        <button onclick="addVideo()">Добавить</button>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">
            Примечание: Если вставить ссылку на страницу, скрипт попытается найти видео. Если не сработает — вставляй прямую ссылку на .mp4.
        </p>
    </div>

    <h2>Моя Витрина</h2>
    <div class="video-grid" id="grid"></div>
</div>

<script>
    // Загружаем сохраненные видео из памяти браузера
    let library = JSON.parse(localStorage.getItem('my_videos') || '[]');

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = library.map((url, index) => `
            <div class="video-item">
                <button class="del-btn" onclick="removeVideo(${index})">X</button>
                <video controls>
                    <source src="${url}" type="video/mp4">
                    Блять, браузер не тянет или ссылка битая.
                </video>
                <div style="font-size:10px; word-break:break-all; margin-top:5px;">${url}</div>
            </div>
        `).join('');
    }

    async function addVideo() {
        const input = document.getElementById('videoUrl');
        let url = input.value.trim();
        
        if (!url) return;

        // Если это не прямая ссылка на mp4, пробуем достать её через CORS прокси (может блокироваться)
        if (!url.endsWith('.mp4')) {
            console.log("Пытаюсь вытянуть видео из страницы...");
            // На чистом фронте это сложно из-за CORS, так что лучше лить прямые ссылки
        }

        library.push(url);
        localStorage.setItem('my_videos', JSON.stringify(library));
        input.value = '';
        render();
    }

    function removeVideo(index) {
        library.splice(index, 1);
        localStorage.setItem('my_videos', JSON.stringify(library));
        render();
    }

    // Первый запуск
    render();
</script>

</body>
</html>
