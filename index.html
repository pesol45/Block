<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мой автопарк | Black Russia</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1a, #03060c);
            min-height: 100vh;
            padding: 24px 20px;
            color: #f0f3f8;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #ffd89b, #ff7b2c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(255, 100, 0, 0.3);
        }

        .badge {
            display: inline-block;
            background: rgba(44, 62, 47, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            margin-top: 12px;
            border: 1px solid rgba(255, 140, 66, 0.4);
        }

        .badge.admin-mode {
            background: #8B4513cc;
            color: #FFE0A3;
            box-shadow: 0 0 12px rgba(255, 100, 0, 0.6);
            border-color: #ffaa44;
        }

        /* Сетка карточек */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 28px;
            margin: 20px 0 30px;
        }

        /* КАРТОЧКА — БЛЕСТЯЩИЙ ДИЗАЙН */
        .car-card {
            background: rgba(15, 25, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 22px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 120, 40, 0.25);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .car-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 120, 40, 0.6);
            box-shadow: 0 25px 40px -12px black;
            background: rgba(20, 32, 45, 0.85);
        }

        /* ГАЛЕРЕЯ — ТОЛЬКО ТОЧКИ */
        .gallery-wrapper {
            position: relative;
            margin-bottom: 12px;
            border-radius: 28px;
            overflow: hidden;
        }

        .gallery-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .gallery-container::-webkit-scrollbar {
            display: none;
        }

        .gallery-img {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #0f151f;
            border-radius: 24px;
            transition: transform 0.2s;
        }

        /* ТОЧКИ (красивые, светящиеся) */
        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 14px;
            margin-bottom: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(220, 220, 255, 0.35);
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 0 2px rgba(0,0,0,0.3);
        }

        .dot.active {
            background: #ffaa44;
            width: 24px;
            border-radius: 20px;
            box-shadow: 0 0 8px #ffaa66;
        }

        /* Кнопка добавления фото (админ) */
        .add-photo-btn {
            background: rgba(58, 124, 165, 0.8);
            border: 1px solid #5fa5cc;
            color: white;
            padding: 8px 12px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0 5px;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .add-photo-btn:hover {
            background: #3a7ca5;
            border-color: #ffaa66;
        }

        /* Название машины */
        .car-name {
            font-size: 1.7rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff7b2c;
            padding-bottom: 10px;
            margin: 12px 0 12px;
            letter-spacing: -0.3px;
        }

        /* Номерной знак (стильный) */
        .car-plate {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid #ffaa55;
            color: #ffcc88;
            display: inline-block;
            margin: 8px 0 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Характеристики */
        .specs {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 12px 16px;
            margin: 14px 0;
            backdrop-filter: blur(2px);
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 140, 66, 0.2);
            font-size: 0.9rem;
        }

        .spec-item:last-child {
            border-bottom: none;
        }

        .price {
            color: #ffcc77;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 0 4px #ff9900;
        }

        /* Нитро бейджи */
        .nitro-badge {
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            background: #ff6600;
            color: black;
        }

        .nitro-x2 { background: #1f5a2e; color: #b3ffaa; }
        .nitro-x5 { background: #b45f1b; color: #ffe6aa; }
        .nitro-x10 { background: #a13a3a; color: #ffb3b3; text-shadow: 0 0 2px red; }

        .tune-tag {
            background: #2c5a7a;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 500;
            margin: 3px;
            display: inline-block;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Кнопки админа */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        .edit-btn, .delete-btn {
            flex: 1;
            padding: 10px;
            border-radius: 60px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .edit-btn { background: #3a7ca5; color: white; box-shadow: 0 2px 6px #1a4a6a; }
        .delete-btn { background: #8b2c2c; color: white; box-shadow: 0 2px 6px #4a1a1a; }

        .edit-btn:active, .delete-btn:active { transform: scale(0.97); }

        /* Админ панель */
        .admin-panel {
            background: rgba(16, 22, 30, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 24px;
            margin-bottom: 36px;
            border: 1px solid #ff8c42;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .admin-form .form-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .admin-form input, .admin-form select, .admin-form textarea {
            background: #111c24;
            border: 1px solid #2c4a5a;
            padding: 10px 16px;
            border-radius: 60px;
            color: white;
            width: 100%;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            background: #111c24;
            padding: 10px 18px;
            border-radius: 60px;
        }

        .admin-form button {
            background: #ff7b2c;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 70px;
            background: rgba(0,0,0,0.3);
            border-radius: 48px;
            color: #aaa;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #14222b;
            border-radius: 48px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #ffaa55;
        }
        .info-text { font-size: 0.7rem; color: #bbb; margin-top: 6px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏁 Мой автопарк | BLACK RUSSIA 🏎️</h1>
        <div id="adminBadge" class="badge">👤 Гость</div>
    </div>

    <!-- Админ панель -->
    <div id="adminZone" style="display: none;">
        <div class="admin-panel">
            <h3>🔧 Админ-панель</h3>
            <div class="admin-form">
                <div class="form-row">
                    <input type="text" id="carName" placeholder="Название машины" style="flex:2">
                    <input type="text" id="carImage" placeholder="Фото (ссылки через |)">
                </div>
                <div class="form-row">
                    <input type="number" id="price" placeholder="Цена">
                    <input type="number" id="accelerationNoNitro" placeholder="Разгон без нитро" step="0.1">
                    <input type="number" id="accelerationWithNitro" placeholder="Разгон с нитро" step="0.1">
                </div>
                <div class="form-row">
                    <input type="number" id="topSpeed" placeholder="Максималка">
                    <select id="nitroType">
                        <option value="none">❌ Без нитро</option>
                        <option value="x2">🔥 x2</option>
                        <option value="x5">💥 x5</option>
                        <option value="x10">⚡ x10</option>
                    </select>
                    <select id="plateCountry">
                        <option value="none">🌍 Без номера</option>
                        <option value="ru">🇷🇺 Россия</option>
                        <option value="ua">🇺🇦 Украина</option>
                        <option value="by">🇧🇾 Беларусь</option>
                        <option value="kz">🇰🇿 Казахстан</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="text" id="plateNumber" placeholder="Гос номер">
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" value="Спорт"> 🏁 Спорт</label>
                    <label><input type="checkbox" value="Спорт+"> 🔥 Спорт+</label>
                    <label><input type="checkbox" value="Комфорт"> ☁️ Комфорт</label>
                    <label><input type="checkbox" value="Дрифт"> 💨 Дрифт</label>
                </div>
                <textarea id="otherSpecs" rows="2" placeholder="Доп. характеристики"></textarea>
                <button id="createCarBtn">➕ Добавить машину</button>
                <div class="info-text">📸 Несколько фото через | (вертикальная черта)</div>
            </div>
        </div>
    </div>

    <div id="carsContainer" class="cars-grid">
        <div class="empty-state">🏎️ Загрузка...</div>
    </div>
    <footer>🔐 Админ: ?key=14881161 | Листай фото — стильные точки внизу</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaWv0A5OCgdAgUFn9lMzQ_tVaga0scpQA",
        authDomain: "site-5378a.firebaseapp.com",
        projectId: "site-5378a",
        storageBucket: "site-5378a.firebasestorage.app",
        messagingSenderId: "1080576728275",
        appId: "1:1080576728275:web:efdb524baf64d8bd9ac826"
    };

    let database, carsRef;
    try {
        const app = firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        carsRef = database.ref('cars');
    } catch(e) { console.error(e); }

    const ADMIN_KEY = "14881161";
    let isAdminMode = false;
    let allCars = [];

    // ГОСТ валидация (краткая)
    function validatePlateNumber(country, number) {
        if (!number || country === 'none') return true;
        const clean = number.toUpperCase().replace(/\s/g, '');
        if (country === 'ru') return /^[АВЕКМНОРСТУХABEKMHOPCTYX]{1}\d{3}[АВЕКМНОРСТУХABEKMHOPCTYX]{2}\d{2,3}$/i.test(clean);
        if (country === 'ua') return /^[A-Z]{2}\d{4}[A-Z]{2}\d{2}$/i.test(clean);
        if (country === 'by') return clean.length >= 5;
        if (country === 'kz') return /^[A-Z]{3}\d{3}$|^\d{3}[A-Z]{3}$/i.test(clean);
        return true;
    }

    function formatPlateForDisplay(country, number) {
        if (!number || country !== 'ru') return number?.toUpperCase() || '';
        let clean = number.toUpperCase();
        if (clean.length >= 6) return `${clean.substring(0,1)}${clean.substring(1,4)}${clean.substring(4,6)} ${clean.substring(6)}`;
        return clean;
    }

    function getCountryFlag(code) { const f = { ua:"🇺🇦", by:"🇧🇾", ru:"🇷🇺", kz:"🇰🇿" }; return f[code] || "🌍"; }
    function getNitroClass(t) { return t === 'x2' ? 'nitro-x2' : t === 'x5' ? 'nitro-x5' : t === 'x10' ? 'nitro-x10' : ''; }
    function getNitroText(t) { return t === 'x2' ? '🔥 x2' : t === 'x5' ? '💥 x5' : t === 'x10' ? '⚡ x10' : '❌ Нет'; }
    function formatPrice(p) { return p ? p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " ₽" : "?"; }
    function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    function showMessage(t, type="error") { 
        let d = document.createElement('div'); 
        d.style.cssText = `position:fixed;bottom:20px;right:20px;background:${type==='success'?'#00aa55':'#ff4444'};color:white;padding:10px 20px;border-radius:40px;z-index:9999`; 
        d.textContent = t; 
        document.body.appendChild(d); 
        setTimeout(()=>d.remove(),3000); 
    }

    function checkAdminAccess() {
        let urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') === ADMIN_KEY) {
            isAdminMode = true;
            document.getElementById('adminZone').style.display = 'block';
            document.getElementById('adminBadge').innerHTML = '👑 АДМИН';
            document.getElementById('adminBadge').classList.add('admin-mode');
        } else {
            isAdminMode = false;
            document.getElementById('adminZone').style.display = 'none';
            document.getElementById('adminBadge').innerHTML = '👤 Гость';
        }
        renderCars();
    }

    function getImageUrls(field) {
        if (!field) return ['https://via.placeholder.com/500x240?text=No+Image'];
        if (field.includes('|')) return field.split('|').map(u=>u.trim()).filter(u=>u);
        return [field];
    }

    function initGalleryDots(containerId, dotWrapperId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const dots = document.getElementById(dotWrapperId)?.querySelectorAll('.dot');
        if (!dots || dots.length === 0) return;
        const updateActive = () => {
            const scrollLeft = container.scrollLeft;
            const scrollWidth = container.scrollWidth;
            const clientWidth = container.clientWidth;
            let idx = 0;
            if (scrollWidth > clientWidth) {
                idx = Math.round((scrollLeft / (scrollWidth - clientWidth)) * (dots.length - 1));
            }
            dots.forEach((dot, i) => {
                if (i === idx) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        };
        container.addEventListener('scroll', updateActive);
        setTimeout(updateActive, 50);
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                const scrollStep = (container.scrollWidth - container.clientWidth) / (dots.length - 1);
                container.scrollTo({ left: scrollStep * i, behavior: 'smooth' });
            });
        });
    }

    function renderCars() {
        let container = document.getElementById('carsContainer');
        if (!allCars.length) { container.innerHTML = '<div class="empty-state">✨ Автопарк пуст, но скоро здесь появятся легенды</div>'; return; }
        container.innerHTML = '';
        allCars.forEach(car => {
            let imageUrls = getImageUrls(car.imageUrl);
            let tuneHtml = car.tunes?.length ? `<div class="spec-item"><strong>🔧 Прошивки:</strong><div>${car.tunes.map(t=>`<span class="tune-tag">${escapeHtml(t)}</span>`).join('')}</div></div>` : '';
            let plateRaw = (car.plateCountry && car.plateNumber && car.plateCountry !== 'none') ? `<div class="car-plate">${getCountryFlag(car.plateCountry)} ${escapeHtml(formatPlateForDisplay(car.plateCountry, car.plateNumber))}</div>` : '';
            
            let dotsHtml = '';
            if (imageUrls.length > 1) {
                dotsHtml = `<div class="gallery-dots" id="dots-${car.id}">${imageUrls.map((_,idx) => `<div class="dot ${idx===0?'active':''}"></div>`).join('')}</div>`;
            }
            
            let addPhotoBtn = '';
            if (isAdminMode) addPhotoBtn = `<button class="add-photo-btn" data-id="${car.id}" data-current="${escapeHtml(car.imageUrl || '')}">➕ Добавить фото</button>`;

            const cardDiv = document.createElement('div');
            cardDiv.className = 'car-card';
            cardDiv.innerHTML = `
                <div class="gallery-wrapper">
                    <div class="gallery-container" id="gallery-${car.id}">
                        ${imageUrls.map(url => `<img class="gallery-img" src="${escapeHtml(url)}" onerror="this.src='https://via.placeholder.com/500x240?text=Error'" loading="lazy">`).join('')}
                    </div>
                    ${dotsHtml}
                </div>
                ${addPhotoBtn}
                <div class="car-name">
                    <span>${escapeHtml(car.name)}</span>
                    ${car.nitroType !== 'none' ? `<span class="nitro-badge ${getNitroClass(car.nitroType)}">${getNitroText(car.nitroType)}</span>` : ''}
                </div>
                ${plateRaw}
                <div class="specs">
                    <div class="spec-item"><strong>💰 Цена:</strong><span class="price">${formatPrice(car.price)}</span></div>
                    <div class="spec-item"><strong>⚡ Разгон 0-100:</strong><span>без нитро: ${car.accelerationNoNitro ?? '?'} сек / с нитро: ${car.accelerationWithNitro ?? '?'} сек</span></div>
                    <div class="spec-item"><strong>📈 Максималка:</strong><span>${car.topSpeed ?? '?'} км/ч</span></div>
                    ${car.nitroType !== 'none' ? `<div class="spec-item"><strong>💨 Нитро:</strong><span class="${getNitroClass(car.nitroType)}">${getNitroText(car.nitroType)}</span></div>` : ''}
                    ${tuneHtml}
                    ${car.otherSpecs ? `<div class="spec-item"><strong>📝 Характеристики:</strong><br>${escapeHtml(car.otherSpecs)}</div>` : ''}
                </div>
                ${isAdminMode ? `<div class="action-buttons"><button class="edit-btn" data-id="${car.id}">✏️ Ред.</button><button class="delete-btn" data-id="${car.id}">🗑 Удал.</button></div>` : ''}
            `;
            container.appendChild(cardDiv);
            if (imageUrls.length > 1) setTimeout(() => initGalleryDots(`gallery-${car.id}`, `dots-${car.id}`), 30);
        });

        if (isAdminMode) {
            document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => { let id = btn.dataset.id; let car = allCars.find(c=>c.id===id); if(car) editCar(id,car); }));
            document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { let id = btn.dataset.id; if(confirm('Удалить навсегда?')) carsRef.child(id).remove(); }));
            document.querySelectorAll('.add-photo-btn').forEach(btn => btn.addEventListener('click', (e) => {
                let id = btn.dataset.id;
                let current = btn.dataset.current;
                let newUrl = prompt("Введите ссылку на фото (можно новую)");
                if (newUrl && newUrl.trim()) {
                    let updated = current ? current + '|' + newUrl.trim() : newUrl.trim();
                    carsRef.child(id).update({ imageUrl: updated }).then(() => showMessage("✅ Фото добавлено","success"));
                }
            }));
        }
    }

    function editCar(id, data) {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content"><h3>✏️ Редактировать</h3>
            <div class="admin-form">
                <input id="eName" value="${escapeHtml(data.name)}" placeholder="Название">
                <input id="eImg" value="${escapeHtml(data.imageUrl||'')}" placeholder="Фото (через |)">
                <input id="ePrice" type="number" value="${data.price||''}" placeholder="Цена">
                <input id="eAccNo" type="number" step="0.1" value="${data.accelerationNoNitro||''}" placeholder="Разгон без нитро">
                <input id="eAccWith" type="number" step="0.1" value="${data.accelerationWithNitro||''}" placeholder="Разгон с нитро">
                <input id="eTop" type="number" value="${data.topSpeed||''}" placeholder="Максималка">
                <select id="eNitro"><option value="none">Без нитро</option><option value="x2" ${data.nitroType==='x2'?'selected':''}>x2</option><option value="x5" ${data.nitroType==='x5'?'selected':''}>x5</option><option value="x10" ${data.nitroType==='x10'?'selected':''}>x10</option></select>
                <select id="eCountry"><option value="none">🌍 Без номера</option><option value="ru" ${data.plateCountry==='ru'?'selected':''}>Россия</option><option value="ua" ${data.plateCountry==='ua'?'selected':''}>Украина</option><option value="by" ${data.plateCountry==='by'?'selected':''}>Беларусь</option><option value="kz" ${data.plateCountry==='kz'?'selected':''}>Казахстан</option></select>
                <input id="ePlate" value="${escapeHtml(data.plateNumber||'')}" placeholder="Гос номер">
                <div class="checkbox-group"><label><input type="checkbox" value="Спорт" ${data.tunes?.includes('Спорт')?'checked':''}> Спорт</label><label><input type="checkbox" value="Спорт+" ${data.tunes?.includes('Спорт+')?'checked':''}> Спорт+</label><label><input type="checkbox" value="Комфорт" ${data.tunes?.includes('Комфорт')?'checked':''}> Комфорт</label><label><input type="checkbox" value="Дрифт" ${data.tunes?.includes('Дрифт')?'checked':''}> Дрифт</label></div>
                <textarea id="eOther">${escapeHtml(data.otherSpecs||'')}</textarea>
                <button id="saveEditBtn">💾 Сохранить</button>
                <button id="cancelBtn" style="background:#555;">Отмена</button>
            </div></div>`;
        document.body.appendChild(modal);
        document.getElementById('saveEditBtn').onclick = () => {
            let country = document.getElementById('eCountry').value;
            let plate = document.getElementById('ePlate').value.trim();
            if (!validatePlateNumber(country, plate)) { showMessage("❌ Неверный формат номера"); return; }
            let tunes = Array.from(document.querySelectorAll('#eName ~ .checkbox-group input:checked')).map(cb=>cb.value);
            let upd = {
                name: document.getElementById('eName').value.trim(),
                imageUrl: document.getElementById('eImg').value.trim(),
                price: parseInt(document.getElementById('ePrice').value)||null,
                accelerationNoNitro: parseFloat(document.getElementById('eAccNo').value)||null,
                accelerationWithNitro: parseFloat(document.getElementById('eAccWith').value)||null,
                topSpeed: parseInt(document.getElementById('eTop').value)||null,
                nitroType: document.getElementById('eNitro').value,
                plateCountry: country,
                plateNumber: plate,
                tunes: tunes,
                otherSpecs: document.getElementById('eOther').value.trim()
            };
            if(!upd.name) { showMessage("Введите название"); return; }
            carsRef.child(id).update(upd).then(()=>{ showMessage("✅ Сохранено","success"); modal.remove(); }).catch(e=>showMessage(e.message));
        };
        document.getElementById('cancelBtn').onclick = () => modal.remove();
    }

    function createCar() {
        if(!isAdminMode) return;
        let country = document.getElementById('plateCountry').value;
        let plate = document.getElementById('plateNumber').value.trim();
        if (!validatePlateNumber(country, plate)) { showMessage("❌ Некорректный гос номер"); return; }
        let tunes = Array.from(document.querySelectorAll('#adminZone .checkbox-group input:checked')).map(cb=>cb.value);
        let newCar = {
            name: document.getElementById('carName').value.trim(),
            imageUrl: document.getElementById('carImage').value.trim(),
            price: parseInt(document.getElementById('price').value)||null,
            accelerationNoNitro: parseFloat(document.getElementById('accelerationNoNitro').value)||null,
            accelerationWithNitro: parseFloat(document.getElementById('accelerationWithNitro').value)||null,
            topSpeed: parseInt(document.getElementById('topSpeed').value)||null,
            nitroType: document.getElementById('nitroType').value,
            plateCountry: country,
            plateNumber: plate,
            tunes: tunes,
            otherSpecs: document.getElementById('otherSpecs').value.trim()
        };
        if(!newCar.name) { showMessage("Введите название"); return; }
        carsRef.push(newCar).then(() => { showMessage("✅ Машина добавлена","success"); Array.from(document.querySelectorAll('#adminZone input, #adminZone select, #adminZone textarea')).forEach(i=>{ if(i.type!=='checkbox') i.value=''; }); document.querySelectorAll('#adminZone .checkbox-group input').forEach(c=>c.checked=false); }).catch(e=>showMessage(e.message));
    }

    function subscribeCars() { if(carsRef) carsRef.on('value', snap => { let d=snap.val(); let list=[]; for(let k in d) list.push({id:k, ...d[k], tunes: d[k].tunes||[]}); list.reverse(); allCars=list; renderCars(); }); }

    document.getElementById('createCarBtn')?.addEventListener('click', createCar);
    subscribeCars();
    checkAdminAccess();
</script>
</body>
</html>
