<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Code to Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

    <textarea id="codeInput" rows="10" cols="50" placeholder="Введите логику (например: Loop: i < 10 -> Action -> EndLoop)"></textarea>
    <br>
    <button onclick="renderFlowchart()">Создать схему</button>

    <div id="graphCanvas" class="mermaid">
        graph TD
        Start((Начало)) --> End((Конец))
    </div>

    <script>
        mermaid.initialize({ startOnLoad: true });

        function renderFlowchart() {
            const input = document.getElementById('codeInput').value;
            const output = document.getElementById('graphCanvas');
            
            // Базовый парсинг строк в формат Mermaid
            // Формат: Действие1 -> Действие2
            let graphDefinition = "graph TD\n";
            if (input.trim() === "") {
                graphDefinition += "Start --> End";
            } else {
                graphDefinition += input;
            }

            output.removeAttribute('data-processed');
            output.innerHTML = graphDefinition;
            
            mermaid.contentLoaded();
        }
    </script>
</body>
</html>
