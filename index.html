<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Jack's Video Grabber</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; padding: 20px; }
        .panel { background: #161616; padding: 20px; border: 1px solid #333; border-radius: 10px; margin-bottom: 20px; }
        input { width: 70%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; }
        button { padding: 12px 20px; cursor: pointer; border: none; font-weight: bold; border-radius: 5px; }
        .btn-find { background: #007bff; color: #fff; }
        .btn-add { background: #28a745; color: #fff; margin-top: 10px; display: none; }
        .preview-box { margin-top: 20px; text-align: center; border-top: 1px solid #333; padding-top: 20px; display: none; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #161616; padding: 10px; border: 1px solid #333; border-radius: 8px; position: relative; }
        video { width: 100%; border-radius: 5px; }
        .del { position: absolute; top: 5px; right: 5px; background: #dc3545; color: #fff; border-radius: 3px; cursor: pointer; }
        h2 { color: #555; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Админка: Парсинг по ссылке</h2>
    <input type="text" id="targetUrl" placeholder="Вставь ссылку на страницу с видео (например, с sex-studentki)">
    <button class="btn-find" onclick="parseSite()">Найти видео</button>
    
    <div id="previewBox" class="preview-box">
        <p>Нашел вот это. Добавляем?</p>
        <video id="previewVid" controls muted style="max-height: 300px;"></video>
        <br>
        <button id="addBtn" class="btn-add" onclick="confirmAdd()">Да, добавить в коллекцию</button>
    </div>
</div>

<h2>Моя коллекция</h2>
<div id="grid" class="video-grid"></div>

<script>
    let library = JSON.parse(localStorage.getItem('jack_vault') || '[]');
    let currentFoundUrl = "";

    // Функция парсинга через прокси
    async function parseSite() {
        const url = document.getElementById('targetUrl').value;
        const btn = document.querySelector('.btn-find');
        if (!url) return;

        btn.innerText = "Ищу, сука...";
        
        try {
            // Используем AllOrigins прокси, чтобы обойти блокировку CORS
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxy);
            const data = await response.json();
            const html = data.contents;

            // Ищем прямой линк на mp4 в коде страницы
            // Обычно они лежат в source src или в скриптах
            const mp4Match = html.match(/https?:\/\/[^"']+\.mp4[^"']*/);
            
            if (mp4Match) {
                currentFoundUrl = mp4Match[0];
                showPreview(currentFoundUrl);
            } else {
                alert("Нихуя не нашел. Видимо, линк спрятан за скриптами. Попробуй другую страницу.");
            }
        } catch (e) {
            alert("Ошибка прокси или сайта. Попробуй еще раз.");
        } finally {
            btn.innerText = "Найти видео";
        }
    }

    function showPreview(url) {
        const box = document.getElementById('previewBox');
        const vid = document.getElementById('previewVid');
        const addBtn = document.getElementById('addBtn');
        
        vid.src = url;
        box.style.display = 'block';
        addBtn.style.display = 'inline-block';
    }

    function confirmAdd() {
        if (!currentFoundUrl) return;
        library.push(currentFoundUrl);
        localStorage.setItem('jack_vault', JSON.stringify(library));
        document.getElementById('previewBox').style.display = 'none';
        render();
    }

    function remove(index) {
        library.splice(index, 1);
        localStorage.setItem('jack_vault', JSON.stringify(library));
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = library.map((url, i) => `
            <div class="card">
                <button class="del" onclick="remove(${i})">Удалить</button>
                <video src="${url}" controls preload="metadata"></video>
                <div style="font-size:10px; color:#555; margin-top:5px; overflow:hidden;">${url}</div>
            </div>
        `).join('');
    }

    render();
</script>

</body>
</html>
