<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal Flowchart Final Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; text-align: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        textarea { width: 35%; padding: 15px; font-family: 'Consolas', monospace; background: #282c34; color: #abb2bf; border: none; font-size: 13px; outline: none; }
        #diagram { flex: 1; background: #fff; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 40px; }
        button { padding: 12px 30px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="renderFlowchart()">ПОСТРОИТЬ КРАСИВУЮ СХЕМУ</button>
</div>

<div class="main">
    <textarea id="pascalCode">
program Task;
begin
  readln(x);
  if x > 6 then
    y := sqr(sin(sqrt(x))) + cos(sqrt(x))
  else if x <= 2 then
    y := 8 * (x * x * x) + 5 * sqr(x) - sin(2 * x)
  else
    writeln('Не определено');
  writeln(y);
end.</textarea>
    <div id="diagram"><div id="graph" class="mermaid"></div></div>
</div>

<script>
    mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'neutral',
        flowchart: { rankSpacing: 40, nodeSpacing: 50, curve: 'basis' }
    });

    function clean(t) {
        return t.replace(/;/g, '').replace(/'/g, '').replace(/\(/g, '[').replace(/\)/g, ']').trim();
    }

    async function renderFlowchart() {
        const input = document.getElementById('pascalCode').value;
        const output = document.getElementById('graph');
        
        const lines = input.split('\n')
            .map(l => l.trim())
            .filter(l => l !== '' && !l.toLowerCase().includes('program') && !l.toLowerCase().includes('var') && l.toLowerCase() !== 'begin' && !l.toLowerCase().startsWith('end'));

        let m = "graph TD\n  Start([Начало])\n";
        let lastId = "Start";
        let nodeIdx = 0;
        let finalMerge = `merge_end`;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let low = line.toLowerCase();

            if (low.startsWith('if ') || low.includes('else if')) {
                let cond = line.replace(/if|then|else/gi, '').trim();
                let ifId = `if_${nodeIdx++}`;
                let thenId = `then_${nodeIdx++}`;
                
                m += `  ${lastId} --> ${ifId}{"${clean(cond)}"}\n`;
                m += `  ${ifId} -- Да --> ${thenId}["${clean(lines[i+1])}"]\n`;
                m += `  ${thenId} --> ${finalMerge}(( ))\n`;
                
                m += `  ${ifId} -- Нет --> `;
                lastId = ifId;
                i++; 
            } else if (low.startsWith('else')) {
                let elseId = `else_act_${nodeIdx++}`;
                m += `${elseId}["${clean(lines[i+1])}"]\n`;
                m += `  ${elseId} --> ${finalMerge}\n`;
                lastId = finalMerge;
                i++;
            } else if (low.startsWith('write') || low.startsWith('read')) {
                let ioId = `io_${nodeIdx++}`;
                m += `  ${lastNode(lastId)} --> ${ioId}[/"${clean(line)}"/]\n`;
                lastId = ioId;
            } else {
                let sId = `step_${nodeIdx++}`;
                m += `  ${lastNode(lastId)} --> ${sId}["${clean(line)}"]\n`;
                lastId = sId;
            }
        }

        function lastNode(id) { return id; }

        m += `\n  ${finalMerge} --> End([Конец])`;

        output.removeAttribute('data-processed');
        output.innerHTML = m;
        await mermaid.run({ nodes: [output] });
    }
</script>
</body>
</html>
