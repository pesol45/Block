<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal to Flowchart 2719</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

    <h3 style="font-family: sans-serif;">Вставьте код Pascal:</h3>
    <textarea id="codeInput" rows="15" cols="70" style="display:block; margin-bottom:10px;">
var n, i, sum: integer;
begin
  write('n = ');
  readln(n);
  sum := 0;
  i := 1;
  while i <= n do
  begin
    sum := sum + i;
    i := i + 2;
  end;
  writeln('Сумма = ', sum);
end.
    </textarea>
    <button onclick="renderPascalFlow()">Создать блок-схему</button>

    <div id="graphContainer" style="margin-top: 20px;"></div>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { fontSize: '14px' } });

        async function renderPascalFlow() {
            const input = document.getElementById('codeInput').value;
            const container = document.getElementById('graphContainer');
            
            let lines = input.split('\n')
                .map(l => l.trim())
                .filter(l => l && l !== 'begin' && l !== 'end.' && l !== 'begin' && l !== 'end;');

            let graphText = "graph TD\nStart([Начало]) --> ";
            
            lines.forEach((line, index) => {
                let clean = line.replace(/['";]/g, "");
                let id = "n" + index;

                if (clean.startsWith('while')) {
                    graphText += `${id}{"${clean}"} -- Да --> `;
                } else if (clean.startsWith('var')) {
                    graphText += `${id}[/"Объявление переменных"/] --> `;
                } else if (clean.includes('write') || clean.includes('read')) {
                    graphText += `${id}[/"${clean}"/] --> `;
                } else {
                    graphText += `${id}["${clean}"] --> `;
                }
            });

            graphText += "End([Конец])";

            container.innerHTML = `<pre class="mermaid">${graphText}</pre>`;
            await mermaid.run();
        }
    </script>
</body>
</html>
