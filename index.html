<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Генератор профилей | Random User API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1rem;
        }

        .card {
            background: white;
            border-radius: 2rem;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(120deg, #667eea, #764ba2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            color: #6c757d;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            border-bottom: 1px solid #e9ecef;
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        /* Аватар */
        .avatar-wrapper {
            margin-bottom: 1.5rem;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        .avatar:hover {
            transform: scale(1.02);
        }

        /* Информация */
        .info {
            background: #f8f9fa;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1rem 0;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.6rem 0;
            border-bottom: 1px dashed #dee2e6;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: 600;
            color: #495057;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .value {
            color: #212529;
            font-weight: 500;
            word-break: break-word;
            text-align: right;
            max-width: 60%;
        }

        /* Кнопки */
        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1.5rem 0 1rem;
        }
        button {
            background: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-primary {
            background: linear-gradient(100deg, #667eea, #764ba2);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
        }
        .btn-outline {
            background: white;
            border: 1px solid #dee2e6;
        }
        .btn-outline:hover {
            background: #f1f3f5;
            border-color: #adb5bd;
        }
        button:active {
            transform: translateY(1px);
        }

        /* лоадер */
        .loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e9ecef;
            border-radius: 50%;
            border-top-color: #764ba2;
            animation: spin 0.6s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }

        footer {
            font-size: 0.7rem;
            color: #adb5bd;
            margin-top: 1rem;
            text-align: center;
        }
        .error-msg {
            background: #fff0f0;
            color: #c92a2a;
            border-radius: 2rem;
            padding: 0.6rem;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <h1>🎲 Случайный профиль</h1>
    <div class="sub">Random User Generator</div>

    <!-- Блок аватара -->
    <div class="avatar-wrapper">
        <img class="avatar" id="avatar" src="https://randomuser.me/api/portraits/women/68.jpg" alt="avatar">
    </div>

    <!-- Блок данных -->
    <div class="info" id="infoBlock">
        <div class="info-row">
            <span class="label">👤 Имя</span>
            <span class="value" id="fullname">Jane Smith</span>
        </div>
        <div class="info-row">
            <span class="label">📧 Email</span>
            <span class="value" id="email">jane.smith@example.com</span>
        </div>
        <div class="info-row">
            <span class="label">📍 Страна / Город</span>
            <span class="value" id="location">Ireland, Dublin</span>
        </div>
        <div class="info-row">
            <span class="label">🎂 Возраст (д/р)</span>
            <span class="value" id="age">28 лет (01.01.1995)</span>
        </div>
        <div class="info-row">
            <span class="label">📞 Телефон</span>
            <span class="value" id="phone">+353 123 456 789</span>
        </div>
        <div class="info-row">
            <span class="label">🔑 Username</span>
            <span class="value" id="username">blueduck387</span>
        </div>
    </div>

    <!-- Кнопки управления -->
    <div class="btn-group">
        <button class="btn-primary" id="generateBtn">✨ Новый человек</button>
        <button class="btn-outline" id="copyBtn">📋 Скопировать данные</button>
    </div>

    <div id="loader" class="loader hidden"></div>
    <div id="errorMsg" class="error-msg hidden"></div>
    <footer>Данные из Random User API • Реальный генератор</footer>
</div>

<script>
    // Элементы DOM
    const avatarEl = document.getElementById('avatar');
    const fullnameEl = document.getElementById('fullname');
    const emailEl = document.getElementById('email');
    const locationEl = document.getElementById('location');
    const ageEl = document.getElementById('age');
    const phoneEl = document.getElementById('phone');
    const usernameEl = document.getElementById('username');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');
    const loader = document.getElementById('loader');
    const errorMsgDiv = document.getElementById('errorMsg');

    // Вспомогательная функция: показать/скрыть лоадер
    function setLoading(isLoading) {
        if (isLoading) {
            loader.classList.remove('hidden');
            errorMsgDiv.classList.add('hidden');
            generateBtn.disabled = true;
            generateBtn.style.opacity = '0.6';
        } else {
            loader.classList.add('hidden');
            generateBtn.disabled = false;
            generateBtn.style.opacity = '1';
        }
    }

    function showError(text) {
        errorMsgDiv.innerText = text;
        errorMsgDiv.classList.remove('hidden');
        setTimeout(() => {
            errorMsgDiv.classList.add('hidden');
        }, 4000);
    }

    // Форматирование даты рождения и возраста
    function formatDateAndAge(dob) {
        const birthDate = new Date(dob.date);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        const day = birthDate.getDate().toString().padStart(2, '0');
        const month = (birthDate.getMonth() + 1).toString().padStart(2, '0');
        const year = birthDate.getFullYear();
        return `${age} лет (${day}.${month}.${year})`;
    }

    // Получение локации в красивом виде: страна + город
    function formatLocation(location) {
        const city = location.city || location.town || 'unknown';
        const country = location.country || 'unknown';
        return `${country}, ${city}`;
    }

    // Главная функция получения данных из API
    async function fetchRandomUser() {
        setLoading(true);
        try {
            // Используем Random User API, запрашиваем 1 результат, русский язык для названий
            const response = await fetch('https://randomuser.me/api/?inc=name,email,picture,location,dob,phone,login&nat=us,gb,fr,de,au,ca,ru,nz&noinfo');
            if (!response.ok) {
                throw new Error(`Ошибка HTTP: ${response.status}`);
            }
            const data = await response.json();
            const user = data.results[0];

            // Сборка полного имени
            const fullName = `${user.name.first} ${user.name.last}`;

            // Аватар (используем medium для баланса качества/скорости)
            const avatarUrl = user.picture.large || user.picture.medium;

            // Локация
            const locationStr = formatLocation(user.location);

            // Возраст + дата рождения
            const ageFormatted = formatDateAndAge(user.dob);

            // Обновляем DOM
            avatarEl.src = avatarUrl;
            avatarEl.alt = `Avatar of ${fullName}`;
            fullnameEl.innerText = fullName;
            emailEl.innerText = user.email;
            locationEl.innerText = locationStr;
            ageEl.innerText = ageFormatted;
            phoneEl.innerText = user.phone;
            usernameEl.innerText = user.login.username;

        } catch (error) {
            console.error('Ошибка загрузки:', error);
            showError('Не удалось загрузить профиль. Проверьте интернет или попробуйте позже.');
            // Можно оставить старые данные, не трогаем
        } finally {
            setLoading(false);
        }
    }

    // Функция копирования всей карточки в виде текста
    async function copyProfileToClipboard() {
        // Собираем текущие данные со страницы (даже если старые — пользователь скопирует то, что видит)
        const profileText = `
👤 Имя: ${fullnameEl.innerText}
📧 Email: ${emailEl.innerText}
📍 Локация: ${locationEl.innerText}
🎂 Возраст: ${ageEl.innerText}
📞 Телефон: ${phoneEl.innerText}
🔑 Логин: ${usernameEl.innerText}
🖼 Аватар: ${avatarEl.src}
        `.trim();

        try {
            await navigator.clipboard.writeText(profileText);
            // Кратковременная подсказка (можно заменить на всплывающий тост)
            const originalText = copyBtn.innerText;
            copyBtn.innerText = '✅ Скопировано!';
            setTimeout(() => {
                copyBtn.innerText = originalText;
            }, 1500);
        } catch (err) {
            console.error('Ошибка копирования:', err);
            showError('Не удалось скопировать данные, разрешите доступ к буферу обмена.');
        }
    }

    // Инициализация: при загрузке страницы получить случайного пользователя
    // и навесить обработчики
    async function init() {
        await fetchRandomUser();
        generateBtn.addEventListener('click', fetchRandomUser);
        copyBtn.addEventListener('click', copyProfileToClipboard);
    }

    // Запускаем приложение
    init();
</script>
</body>
</html>
