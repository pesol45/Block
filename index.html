<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Современный форум | Все функции</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px 20px;
            transition: all 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Современная шапка */
        .forum-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px 28px;
            margin-bottom: 28px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        body.dark .forum-header {
            background: rgba(30, 41, 59, 0.95);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 6px;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-icon {
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #4a5568;
            font-size: 0.9rem;
        }

        body.dark .btn-icon {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-icon:hover {
            transform: translateY(-2px);
            background: rgba(102, 126, 234, 0.2);
        }

        /* Админ панель */
        .admin-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            display: none;
            border: 2px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        body.dark .admin-panel {
            background: rgba(30, 41, 59, 0.95);
        }

        .admin-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topic-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .topic-form input, .topic-form textarea {
            padding: 14px 18px;
            border-radius: 28px;
            border: 2px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: white;
        }

        body.dark .topic-form input, body.dark .topic-form textarea {
            background: #1e293b;
            border-color: #475569;
            color: white;
        }

        .topic-form input:focus, .topic-form textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* Карточки тем */
        .topic-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            margin-bottom: 24px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        body.dark .topic-card {
            background: rgba(30, 41, 59, 0.95);
        }

        .topic-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.2);
        }

        .topic-header {
            padding: 24px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .topic-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 8px;
        }

        body.dark .topic-title {
            color: #f1f5f9;
        }

        .topic-desc {
            color: #64748b;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .topic-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .delete-topic-btn {
            background: rgba(239, 68, 68, 0.1);
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .delete-topic-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Ответы */
        .answers-section {
            padding: 20px 24px 24px;
        }

        .answers-list {
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .answer-item {
            background: rgba(241, 245, 249, 0.6);
            border-radius: 24px;
            padding: 16px 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        body.dark .answer-item {
            background: rgba(15, 23, 42, 0.6);
        }

        .nested-answers {
            margin-left: 40px;
            margin-top: 16px;
            border-left: 3px dashed #cbd5e1;
            padding-left: 20px;
        }

        .answer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .answer-author {
            font-weight: 700;
            color: #667eea;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .answer-text {
            word-break: break-word;
            margin: 12px 0;
            line-height: 1.5;
            color: #2d3748;
        }

        body.dark .answer-text {
            color: #e2e8f0;
        }

        .answer-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .like-btn.liked {
            color: #ef4444;
        }

        .reaction-buttons {
            display: inline-flex;
            gap: 4px;
        }

        .reaction-emoji {
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .reaction-emoji:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: scale(1.1);
        }

        .answer-image {
            max-width: 200px;
            max-height: 150px;
            border-radius: 16px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .answer-image:hover {
            transform: scale(1.05);
        }

        /* Форма ответа */
        .add-answer-form {
            margin-top: 24px;
        }

        .reply-toolbar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .reply-toolbar input, .reply-toolbar textarea {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 2px solid #e2e8f0;
            font-family: inherit;
            transition: all 0.3s;
            background: white;
        }

        body.dark .reply-toolbar input, body.dark .reply-toolbar textarea {
            background: #1e293b;
            border-color: #475569;
            color: white;
        }

        .reply-toolbar input:focus, .reply-toolbar textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .reply-toolbar textarea {
            resize: vertical;
            min-height: 70px;
        }

        .btn-reply {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-reply:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .attach-btn {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #e2e8f0;
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* Чат */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 340px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            display: none;
            flex-direction: column;
            z-index: 1000;
        }

        body.dark .chat-widget {
            background: rgba(30, 41, 59, 0.98);
        }

        .chat-widget.open {
            display: flex;
        }

        .chat-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 28px 28px 0 0;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-weight: 600;
        }

        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .chat-input-area {
            display: flex;
            padding: 16px;
            gap: 10px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: 2px solid #e2e8f0;
            background: white;
        }

        body.dark .chat-input-area input {
            background: #1e293b;
            border-color: #475569;
            color: white;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: white;
            font-size: 0.8rem;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .chat-widget {
                width: 300px;
                right: 16px;
                bottom: 16px;
            }
            .topic-title {
                font-size: 1.2rem;
            }
            .reply-toolbar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="forum-header">
        <div class="logo">
            <h1><i class="fas fa-comet"></i> NeoForum</h1>
            <p>Современное общение без границ</p>
        </div>
        <div class="header-buttons">
            <button id="themeToggleBtn" class="btn-icon"><i class="fas fa-moon"></i> Тема</button>
            <button id="chatToggleBtn" class="btn-icon"><i class="fas fa-comment-dots"></i> Чат</button>
            <button id="adminLoginBtn" class="btn-icon"><i class="fas fa-crown"></i> Админ</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="admin-title"><i class="fas fa-gem"></i> Панель администратора</div>
        <div class="topic-form">
            <input type="text" id="topicTitleInput" placeholder="✨ Заголовок новой темы">
            <textarea id="topicDescInput" rows="2" placeholder="📝 Описание темы (необязательно)"></textarea>
            <button id="createTopicBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> Создать тему</button>
        </div>
    </div>

    <div id="topicsContainer" class="topics-list">
        <div class="empty-message"><i class="fas fa-spinner fa-pulse"></i> Загрузка форума...</div>
    </div>
    <footer>
        <i class="fas fa-heart" style="color: #ff6b6b;"></i> Лайки | <i class="fas fa-comments"></i> Вложенные ответы | <i class="fas fa-at"></i> Упоминания | 
        <i class="fas fa-image"></i> Изображения | <i class="fas fa-smile"></i> Эмодзи | <i class="fas fa-palette"></i> Тёмная тема | <i class="fas fa-comment-dots"></i> Чат
    </footer>
</div>

<div id="chatWidget" class="chat-widget">
    <div class="chat-header"><span><i class="fas fa-comments"></i> Общий чат</span><span id="closeChat" style="cursor:pointer">✕</span></div>
    <div id="chatMessagesList" class="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Имя: сообщение (например, Анна: привет)">
        <button id="sendChatBtn" class="btn-primary" style="padding: 8px 16px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCMi3eKNZ4OgD2YCdhEFDOsmuclKZkjflo",
        authDomain: "from-b14b1.firebaseapp.com",
        projectId: "from-b14b1",
        storageBucket: "from-b14b1.firebasestorage.app",
        messagingSenderId: "604060443375",
        appId: "1:604060443375:web:f6fc69f385a4c59ee3311a"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let isAdmin = false;
    const ADMIN_PASSWORD = "admin123";
    const userId = localStorage.getItem('forum_user') || 'user_' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem('forum_user', userId);
    
    const adminPanelDiv = document.getElementById('adminPanel');
    const topicsContainer = document.getElementById('topicsContainer');
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function uploadImage(file) {
        const filename = `${Date.now()}_${Math.random().toString(36)}.${file.name.split('.').pop()}`;
        const ref = storage.ref(`images/${filename}`);
        await ref.put(file);
        return await ref.getDownloadURL();
    }
    
    async function toggleLike(answerId) {
        const answerRef = db.collection('answers').doc(answerId);
        const doc = await answerRef.get();
        const likes = doc.data()?.likes || [];
        if (likes.includes(userId)) {
            await answerRef.update({ likes: likes.filter(id => id !== userId) });
        } else {
            await answerRef.update({ likes: [...likes, userId] });
        }
    }
    
    async function addReaction(answerId, emoji) {
        const answerRef = db.collection('answers').doc(answerId);
        const doc = await answerRef.get();
        const reactions = doc.data()?.reactions || {};
        if (!reactions[emoji]) reactions[emoji] = [];
        if (!reactions[emoji].includes(userId)) {
            reactions[emoji].push(userId);
            await answerRef.update({ reactions });
        }
    }
    
    async function createTopic() {
        if (!isAdmin) return alert("Только администратор может создавать темы!");
        const title = document.getElementById('topicTitleInput').value.trim();
        if (!title) return alert("Введите заголовок темы");
        await db.collection('topics').add({
            title: title,
            description: document.getElementById('topicDescInput').value.trim(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('topicTitleInput').value = '';
        document.getElementById('topicDescInput').value = '';
    }
    
    async function deleteTopic(topicId) {
        if (!isAdmin || !confirm("Удалить тему и все ответы?")) return;
        const answers = await db.collection('answers').where('topicId', '==', topicId).get();
        const batch = db.batch();
        answers.forEach(doc => batch.delete(doc.ref));
        batch.delete(db.collection('topics').doc(topicId));
        await batch.commit();
    }
    
    async function addAnswer(topicId, text, author, parentId = null, imageUrl = null) {
        if (!text.trim() && !imageUrl) return alert("Напишите ответ или добавьте изображение");
        await db.collection('answers').add({
            topicId, text: text.trim(), author: author.trim() || "Гость", parentId, imageUrl,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            likes: [], reactions: {}
        });
    }
    
    // Реальный рендер с мгновенными обновлениями
    function startRealtime() {
        db.collection('topics').orderBy('createdAt', 'desc').onSnapshot((topicsSnap) => {
            db.collection('answers').orderBy('createdAt', 'asc').onSnapshot((answersSnap) => {
                const answersMap = new Map();
                answersSnap.forEach(doc => answersMap.set(doc.id, { id: doc.id, ...doc.data() }));
                
                if (topicsSnap.empty) {
                    topicsContainer.innerHTML = '<div class="empty-message"><i class="fas fa-comment-slash"></i> Нет тем. Администратор, создайте первую тему!</div>';
                    return;
                }
                
                let html = '';
                for (const topicDoc of topicsSnap.docs) {
                    const topic = topicDoc.data();
                    const topicId = topicDoc.id;
                    const topicAnswers = Array.from(answersMap.values()).filter(a => a.topicId === topicId);
                    
                    function renderTree(parentId = null) {
                        const children = topicAnswers.filter(a => a.parentId === parentId);
                        if (!children.length) return '';
                        let result = '<div class="nested-answers">';
                        for (const ans of children) {
                            const likesCount = ans.likes?.length || 0;
                            const isLiked = ans.likes?.includes(userId) || false;
                            const reactions = ans.reactions || {};
                            let reactionsHtml = '';
                            for (const [emoji, users] of Object.entries(reactions)) {
                                reactionsHtml += `<span style="background:rgba(102,126,234,0.2); padding:2px 8px; border-radius:20px; font-size:0.7rem; margin-left:4px;">${emoji} ${users.length}</span>`;
                            }
                            result += `
                                <div class="answer-item">
                                    <div class="answer-header">
                                        <span class="answer-author"><i class="fas fa-user-astronaut"></i> ${escapeHtml(ans.author)}</span>
                                        <small style="color:#94a3b8;">${ans.createdAt?.toDate().toLocaleString() || 'только что'}</small>
                                    </div>
                                    <div class="answer-text">${escapeHtml(ans.text)}</div>
                                    ${ans.imageUrl ? `<img src="${ans.imageUrl}" class="answer-image" onclick="window.open('${ans.imageUrl}')" />` : ''}
                                    <div class="answer-actions">
                                        <button class="action-btn like-btn" data-id="${ans.id}">
                                            <i class="fas fa-heart" style="color: ${isLiked ? '#ef4444' : '#94a3b8'}"></i> ${likesCount}
                                        </button>
                                        <button class="action-btn reply-btn" data-id="${ans.id}" data-author="${escapeHtml(ans.author)}">
                                            <i class="fas fa-reply"></i> Ответить
                                        </button>
                                        <button class="action-btn mention-btn" data-author="${escapeHtml(ans.author)}">
                                            <i class="fas fa-at"></i> Упомянуть
                                        </button>
                                        <div class="reaction-buttons">
                                            <span class="reaction-emoji" data-id="${ans.id}" data-emoji="👍">👍</span>
                                            <span class="reaction-emoji" data-id="${ans.id}" data-emoji="❤️">❤️</span>
                                            <span class="reaction-emoji" data-id="${ans.id}" data-emoji="😂">😂</span>
                                            <span class="reaction-emoji" data-id="${ans.id}" data-emoji="😮">😮</span>
                                        </div>
                                        ${reactionsHtml}
                                    </div>
                                    ${renderTree(ans.id)}
                                </div>
                            `;
                        }
                        result += '</div>';
                        return result;
                    }
                    
                    html += `
                        <div class="topic-card">
                            <div class="topic-header">
                                <div style="flex:1">
                                    <div class="topic-title">${escapeHtml(topic.title)}</div>
                                    ${topic.description ? `<div class="topic-desc">${escapeHtml(topic.description)}</div>` : ''}
                                    <div class="topic-meta">
                                        <span><i class="far fa-calendar-alt"></i> ${topic.createdAt?.toDate().toLocaleString() || 'недавно'}</span>
                                        <span><i class="fas fa-reply-all"></i> ${topicAnswers.length} ответов</span>
                                    </div>
                                </div>
                                ${isAdmin ? `<button class="delete-topic-btn" data-id="${topicId}"><i class="fas fa-trash-alt"></i> Удалить</button>` : ''}
                            </div>
                            <div class="answers-section">
                                <div class="answers-list">
                                    ${renderTree(null)}
                                </div>
                                <div class="add-answer-form" data-topic="${topicId}">
                                    <div class="reply-toolbar">
                                        <input type="text" placeholder="Ваше имя" class="answer-name" id="name-${topicId}" style="flex:0.5">
                                        <textarea rows="2" placeholder="Написать ответ..." class="answer-textarea" id="text-${topicId}" style="flex:2"></textarea>
                                        <input type="file" accept="image/*" class="image-upload" id="image-${topicId}" style="display:none">
                                        <button class="attach-btn" data-topic="${topicId}"><i class="fas fa-image"></i> Фото</button>
                                        <button class="btn-reply submit-answer" data-topic="${topicId}"><i class="fas fa-paper-plane"></i> Отправить</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                
                topicsContainer.innerHTML = html;
                attachEvents();
            });
        });
    }
    
    function attachEvents() {
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = async () => await toggleLike(btn.dataset.id);
        });
        document.querySelectorAll('.reaction-emoji').forEach(el => {
            el.onclick = async () => await addReaction(el.dataset.id, el.dataset.emoji);
        });
        document.querySelectorAll('.reply-btn').forEach(btn => {
            btn.onclick = () => {
                const parentId = btn.dataset.id;
                const author = btn.dataset.author;
                const topicId = btn.closest('.topic-card').querySelector('.add-answer-form').dataset.topic;
                const textarea = document.getElementById(`text-${topicId}`);
                textarea.value = `@${author} `;
                textarea.focus();
                textarea.dataset.parentId = parentId;
            };
        });
        document.querySelectorAll('.mention-btn').forEach(btn => {
            btn.onclick = () => {
                const author = btn.dataset.author;
                const topicId = btn.closest('.topic-card').querySelector('.add-answer-form').dataset.topic;
                const textarea = document.getElementById(`text-${topicId}`);
                textarea.value = `@${author} `;
                textarea.focus();
            };
        });
        document.querySelectorAll('.attach-btn').forEach(btn => {
            btn.onclick = () => document.getElementById(`image-${btn.dataset.topic}`).click();
        });
        document.querySelectorAll('.image-upload').forEach(input => {
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const topicId = input.id.split('-')[1];
                const nameInput = document.getElementById(`name-${topicId}`);
                const textarea = document.getElementById(`text-${topicId}`);
                const parentId = textarea.dataset.parentId || null;
                const url = await uploadImage(file);
                await addAnswer(topicId, textarea.value, nameInput.value, parentId, url);
                textarea.value = '';
                delete textarea.dataset.parentId;
                input.value = '';
            };
        });
        document.querySelectorAll('.submit-answer').forEach(btn => {
            btn.onclick = async () => {
                const topicId = btn.dataset.topic;
                const nameInput = document.getElementById(`name-${topicId}`);
                const textarea = document.getElementById(`text-${topicId}`);
                const parentId = textarea.dataset.parentId || null;
                await addAnswer(topicId, textarea.value, nameInput.value, parentId, null);
                textarea.value = '';
                delete textarea.dataset.parentId;
            };
        });
        if (isAdmin) {
            document.querySelectorAll('.delete-topic-btn').forEach(btn => {
                btn.onclick = () => deleteTopic(btn.dataset.id);
            });
        }
    }
    
    // Чат
    function initChat() {
        const chatWidget = document.getElementById('chatWidget');
        const chatMessages = document.getElementById('chatMessagesList');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendChatBtn');
        const closeChat = document.getElementById('closeChat');
        const chatToggle = document.getElementById('chatToggleBtn');
        
        chatToggle.onclick = () => chatWidget.classList.toggle('open');
        closeChat.onclick = () => chatWidget.classList.remove('open');
        
        db.collection('chat').orderBy('timestamp', 'asc').limit(50).onSnapshot(snap => {
            chatMessages.innerHTML = '';
            snap.forEach(doc => {
                const msg = doc.data();
                const div = document.createElement('div');
                div.className = 'chat-message';
                div.innerHTML = `<b>${escapeHtml(msg.author)}</b>: ${escapeHtml(msg.text)} <small style="color:#94a3b8;">${msg.timestamp?.toDate().toLocaleTimeString() || ''}</small>`;
                chatMessages.appendChild(div);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
        
        sendBtn.onclick = async () => {
            let val = chatInput.value.trim();
            if (!val) return;
            let author = "Гость", text = val;
            if (val.includes(':')) {
                const parts = val.split(':');
                author = parts[0].trim();
                text = parts.slice(1).join(':').trim();
            }
            if (!text) text = val;
            await db.collection('chat').add({
                author: author.substring(0, 20),
                text: text.substring(0, 200),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            chatInput.value = '';
        };
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.onclick(); };
    }
    
    function initTheme() {
        const saved = localStorage.getItem('darkTheme');
        if (saved === 'true') document.body.classList.add('dark');
        document.getElementById('themeToggleBtn').onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkTheme', document.body.classList.contains('dark'));
        };
    }
    
    document.getElementById('adminLoginBtn').onclick = () => {
        const pwd = prompt("Введите пароль администратора:");
        if (pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            adminPanelDiv.style.display = "block";
            alert("✅ Админ-режим активирован!");
            startRealtime();
        } else if (pwd) alert("❌ Неверный пароль");
    };
    
    document.getElementById('createTopicBtn').onclick = createTopic;
    
    initTheme();
    initChat();
    startRealtime();
</script>
</body>
</html>
