<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Black Russia | Автопарк</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
            position: relative;
        }

        /* Анимированное зернистое поле */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(10, 10, 15, 0.6), #000000);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* ГЛОССИ ШАПКА */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 40%, #444444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            text-shadow: 0 0 30px rgba(255,255,255,0.15);
        }

        .badge {
            display: inline-block;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.75rem;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.12);
            color: #aaa;
            font-weight: 500;
        }

        .badge.admin-mode {
            background: rgba(0, 0, 0, 0.85);
            border-color: #ffaa33;
            color: #ffcc77;
            box-shadow: 0 0 20px rgba(255, 170, 51, 0.3);
        }

        /* СЕТКА */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 32px;
            margin: 30px 0 40px;
        }

        /* КАРТОЧКА — ЖИДКОЕ СТЕКЛО + ХРОМ */
        .car-card {
            background: rgba(6, 8, 12, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        /* Эффект жидкого стекла (глянцевый блик) */
        .car-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 180%;
            height: 180%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(25deg);
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .car-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 170, 51, 0.5);
            box-shadow: 0 30px 50px -15px black, inset 0 1px 1px rgba(255,255,255,0.1);
            background: rgba(8, 12, 18, 0.8);
        }

        /* ГАЛЕРЕЯ */
        .gallery-wrapper {
            position: relative;
            margin-bottom: 12px;
            border-radius: 32px;
            overflow: hidden;
        }

        .gallery-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .gallery-container::-webkit-scrollbar {
            display: none;
        }

        .gallery-img {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #05080c;
            border-radius: 28px;
            transition: all 0.2s;
        }

        /* ТОЧКИ — СТИЛЬНЫЕ, ХРОМ */
        .gallery-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(150, 150, 170, 0.5);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .dot.active {
            background: #ffbb44;
            width: 28px;
            border-radius: 20px;
            box-shadow: 0 0 10px #ffaa44;
        }

        /* НАЗВАНИЕ */
        .car-name {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255, 140, 66, 0.5);
            padding-bottom: 10px;
            margin: 16px 0 12px;
            letter-spacing: -0.3px;
        }

        /* Плашка номера */
        .car-plate {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid #ffaa55;
            color: #ffdd99;
            display: inline-block;
            margin: 6px 0 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        /* ХАРАКТЕРИСТИКИ */
        .specs {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 14px 18px;
            margin: 14px 0;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 140, 66, 0.2);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .price {
            color: #ffcc77;
            font-weight: 800;
            font-size: 1.1rem;
            text-shadow: 0 0 6px #ff8800;
        }

        .nitro-badge {
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 800;
            background: #222;
        }

        .nitro-x2 { background: #1f4a2a; color: #b3ffaa; box-shadow: inset 0 0 6px #44ff44; }
        .nitro-x5 { background: #6e3c0c; color: #ffdd88; box-shadow: inset 0 0 6px #ffaa33; }
        .nitro-x10 { background: #660000; color: #ffaaaa; box-shadow: inset 0 0 6px #ff3333; }

        .tune-tag {
            background: #101a24;
            padding: 4px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 500;
            margin: 3px;
            display: inline-block;
            border: 0.5px solid #ffaa5533;
        }

        /* АДМИН КНОПКИ */
        .action-buttons {
            display: flex;
            gap: 14px;
            margin-top: 20px;
        }

        .edit-btn, .delete-btn, .add-photo-btn {
            flex: 1;
            padding: 10px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(20, 28, 36, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            transition: 0.2s;
        }

        .edit-btn:hover { background: #2a5f7a; border-color: #88ccff; }
        .delete-btn:hover { background: #8b2c2c; border-color: #ff8866; }
        .add-photo-btn { background: #1a2a33; margin-top: 8px; }
        .add-photo-btn:hover { background: #2a4a5a; }

        /* АДМИН ПАНЕЛЬ - ЧЁРНОЕ СТЕКЛО */
        .admin-panel {
            background: rgba(2, 4, 8, 0.85);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 28px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 120, 40, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .admin-form input, .admin-form select, .admin-form textarea {
            background: #050a10;
            border: 1px solid #222a30;
            padding: 12px 18px;
            border-radius: 60px;
            color: white;
            width: 100%;
        }

        .checkbox-group {
            background: #050a10;
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .admin-form button {
            background: #ff7b2c;
            border: none;
            font-weight: bold;
            padding: 12px;
            border-radius: 60px;
        }

        .empty-state {
            text-align: center;
            padding: 70px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            color: #aaa;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: #0a0e14;
            border-radius: 56px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #ffaa44;
            box-shadow: 0 0 35px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ BLACK RUSSIA ⚡</h1>
        <div id="adminBadge" class="badge">▸ GUEST MODE ◂</div>
    </div>

    <div id="adminZone" style="display: none;">
        <div class="admin-panel">
            <h3 style="margin-bottom: 16px;">⛓️ АДМИН-ПАНЕЛЬ</h3>
            <div class="admin-form">
                <div class="form-row" style="display:flex; gap:12px; flex-wrap:wrap;">
                    <input type="text" id="carName" placeholder="Название" style="flex:2">
                    <input type="text" id="carImage" placeholder="Фото (ссылки через |)">
                </div>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <input type="number" id="price" placeholder="Цена">
                    <input type="number" id="accelerationNoNitro" placeholder="Разгон без нитро" step="0.1">
                    <input type="number" id="accelerationWithNitro" placeholder="Разгон с нитро" step="0.1">
                </div>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <input type="number" id="topSpeed" placeholder="Максималка">
                    <select id="nitroType"><option value="none">Нет нитро</option><option value="x2">x2</option><option value="x5">x5</option><option value="x10">x10</option></select>
                    <select id="plateCountry"><option value="none">Без номера</option><option value="ru">🇷🇺 Россия</option><option value="ua">🇺🇦 Украина</option><option value="by">🇧🇾 Беларусь</option><option value="kz">🇰🇿 Казахстан</option></select>
                </div>
                <input type="text" id="plateNumber" placeholder="Гос номер">
                <div class="checkbox-group">
                    <label><input type="checkbox" value="Спорт"> Спорт</label>
                    <label><input type="checkbox" value="Спорт+"> Спорт+</label>
                    <label><input type="checkbox" value="Комфорт"> Комфорт</label>
                    <label><input type="checkbox" value="Дрифт"> Дрифт</label>
                </div>
                <textarea id="otherSpecs" rows="2" placeholder="Доп. характеристики"></textarea>
                <button id="createCarBtn">➕ СОЗДАТЬ</button>
            </div>
        </div>
    </div>

    <div id="carsContainer" class="cars-grid"><div class="empty-state">ЗАГРУЗКА АВТОПАРКА...</div></div>
    <footer>⚙️ АДМИН: ?key=14881161 | ЖИДКОЕ СТЕКЛО • ЧЁРНЫЙ ХРОМ</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaWv0A5OCgdAgUFn9lMzQ_tVaga0scpQA",
        authDomain: "site-5378a.firebaseapp.com",
        projectId: "site-5378a",
        storageBucket: "site-5378a.firebasestorage.app",
        messagingSenderId: "1080576728275",
        appId: "1:1080576728275:web:efdb524baf64d8bd9ac826"
    };
    let db, carsRef;
    try { const app = firebase.initializeApp(firebaseConfig); db = firebase.database(); carsRef = db.ref('cars'); } catch(e) { console.error(e); }

    const ADMIN_KEY = "14881161";
    let admin = false, allCars = [];

    function validatePlate(country, num) {
        if (!num || country === 'none') return true;
        const c = num.toUpperCase().replace(/\s/g, '');
        if (country === 'ru') return /^[АВЕКМНОРСТУХ]{1}\d{3}[АВЕКМНОРСТУХ]{2}\d{2,3}$/i.test(c);
        if (country === 'ua') return /^[A-Z]{2}\d{4}[A-Z]{2}\d{2}$/i.test(c);
        if (country === 'by') return c.length >= 5;
        if (country === 'kz') return /^[A-Z]{3}\d{3}$|^\d{3}[A-Z]{3}$/i.test(c);
        return true;
    }

    function formatPlate(country, num) {
        if (!num || country !== 'ru') return num?.toUpperCase() || '';
        let n = num.toUpperCase();
        if(n.length >= 6) return `${n[0]}${n.substr(1,3)}${n.substr(4,2)} ${n.substr(6)}`;
        return n;
    }

    function flag(c) { const f={ua:"🇺🇦",by:"🇧🇾",ru:"🇷🇺",kz:"🇰🇿"}; return f[c]||"🌍"; }
    function nitroClass(t) { return t==='x2'?'nitro-x2':t==='x5'?'nitro-x5':t==='x10'?'nitro-x10':''; }
    function nitroText(t) { return t==='x2'?'x2':t==='x5'?'x5':t==='x10'?'x10':'нет'; }
    function priceFmt(p) { return p ? p.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " ₽" : "?"; }
    function esc(s) { if(!s)return ''; return String(s).replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function msg(t,type="error"){ let d=document.createElement('div'); d.style.cssText=`position:fixed;bottom:20px;right:20px;background:${type==='success'?'#00aa55':'#ff4444'};color:white;padding:10px 20px;border-radius:40px;z-index:9999`; d.textContent=t; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }

    function checkAdmin() {
        if(new URLSearchParams(location.search).get('key') === ADMIN_KEY) {
            admin = true;
            document.getElementById('adminZone').style.display = 'block';
            document.getElementById('adminBadge').innerHTML = '◈ ADMIN MODE ◈';
            document.getElementById('adminBadge').classList.add('admin-mode');
        } else { admin = false; document.getElementById('adminZone').style.display = 'none'; document.getElementById('adminBadge').innerHTML = '▸ GUEST MODE ◂'; }
        renderAll();
    }

    function getImages(imgField) {
        if(!imgField) return ['https://via.placeholder.com/500x240?text=NO+PHOTO'];
        if(imgField.includes('|')) return imgField.split('|').map(s=>s.trim()).filter(s=>s);
        return [imgField];
    }

    function initDots(containerId, dotWrapId) {
        const cont = document.getElementById(containerId); if(!cont) return;
        const dots = document.getElementById(dotWrapId)?.querySelectorAll('.dot');
        if(!dots || !dots.length) return;
        const update = () => {
            let idx = 0;
            const sw = cont.scrollWidth, cw = cont.clientWidth;
            if(sw > cw) idx = Math.round((cont.scrollLeft / (sw - cw)) * (dots.length-1));
            dots.forEach((d,i)=> i===idx ? d.classList.add('active') : d.classList.remove('active'));
        };
        cont.addEventListener('scroll', update);
        setTimeout(update, 60);
        dots.forEach((d,i)=> d.addEventListener('click',()=>{ cont.scrollTo({ left: (cont.scrollWidth - cont.clientWidth)/(dots.length-1)*i, behavior:'smooth' }); }));
    }

    function renderAll() {
        const container = document.getElementById('carsContainer');
        if(!allCars.length) { container.innerHTML = '<div class="empty-state">◈ АВТОПАРК ПУСТ ◈</div>'; return; }
        container.innerHTML = '';
        allCars.forEach(car => {
            const urls = getImages(car.imageUrl);
            const tunesHtml = car.tunes?.length ? `<div class="spec-item"><strong>⚙️ ПРОШИВКИ</strong><div>${car.tunes.map(t=>`<span class="tune-tag">${esc(t)}</span>`).join('')}</div></div>` : '';
            const plateHtml = (car.plateCountry && car.plateNumber && car.plateCountry!=='none') ? `<div class="car-plate">${flag(car.plateCountry)} ${esc(formatPlate(car.plateCountry, car.plateNumber))}</div>` : '';
            const dotsHtml = urls.length>1 ? `<div class="gallery-dots" id="dots-${car.id}">${urls.map((_,i)=>`<div class="dot ${i===0?'active':''}"></div>`).join('')}</div>` : '';
            const addBtn = admin ? `<button class="add-photo-btn" data-id="${car.id}" data-curr="${esc(car.imageUrl||'')}">➕ ДОБАВИТЬ ФОТО</button>` : '';
            const card = document.createElement('div'); card.className = 'car-card';
            card.innerHTML = `
                <div class="gallery-wrapper">
                    <div class="gallery-container" id="gallery-${car.id}">${urls.map(u=>`<img class="gallery-img" src="${esc(u)}" onerror="this.src='https://via.placeholder.com/500x240?text=ERROR'" loading="lazy">`).join('')}</div>
                    ${dotsHtml}
                </div>
                ${addBtn}
                <div class="car-name"><span>${esc(car.name)}</span>${car.nitroType !== 'none' ? `<span class="nitro-badge ${nitroClass(car.nitroType)}">${nitroText(car.nitroType)}</span>` : ''}</div>
                ${plateHtml}
                <div class="specs">
                    <div class="spec-item"><strong>💰 ЦЕНА</strong><span class="price">${priceFmt(car.price)}</span></div>
                    <div class="spec-item"><strong>⚡ 0-100</strong><span>без нитро: ${car.accelerationNoNitro??'?'}c / с нитро: ${car.accelerationWithNitro??'?'}c</span></div>
                    <div class="spec-item"><strong>📈 МАКСИМАЛКА</strong><span>${car.topSpeed??'?'} км/ч</span></div>
                    ${car.nitroType !== 'none' ? `<div class="spec-item"><strong>💨 НИТРО</strong><span class="${nitroClass(car.nitroType)}">${nitroText(car.nitroType)}</span></div>` : ''}
                    ${tunesHtml}
                    ${car.otherSpecs ? `<div class="spec-item"><strong>🔧 ХАРАКТЕРИСТИКИ</strong><br>${esc(car.otherSpecs)}</div>` : ''}
                </div>
                ${admin ? `<div class="action-buttons"><button class="edit-btn" data-id="${car.id}">✏️ РЕД.</button><button class="delete-btn" data-id="${car.id}">🗑 УДАЛИТЬ</button></div>` : ''}
            `;
            container.appendChild(card);
            if(urls.length>1) setTimeout(()=>initDots(`gallery-${car.id}`,`dots-${car.id}`), 30);
        });
        if(admin) {
            document.querySelectorAll('.edit-btn').forEach(btn=>btn.addEventListener('click',()=>{ let id=btn.dataset.id; let c=allCars.find(x=>x.id===id); if(c) editCar(id,c); }));
            document.querySelectorAll('.delete-btn').forEach(btn=>btn.addEventListener('click',()=>{ if(confirm('УДАЛИТЬ?')) carsRef.child(btn.dataset.id).remove(); }));
            document.querySelectorAll('.add-photo-btn').forEach(btn=>btn.addEventListener('click',()=>{
                let id=btn.dataset.id, cur=btn.dataset.curr, newUrl=prompt('ССЫЛКА НА ФОТО:');
                if(newUrl && newUrl.trim()) carsRef.child(id).update({ imageUrl: cur ? cur+'|'+newUrl.trim() : newUrl.trim() }).then(()=>msg('✅ ФОТО ДОБАВЛЕНО','success'));
            }));
        }
    }

    function editCar(id, data) {
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content"><h3 style="margin-bottom:16px;">⛓️ РЕДАКТОР</h3>
            <div class="admin-form"><input id="eName" value="${esc(data.name)}" placeholder="Название"><input id="eImg" value="${esc(data.imageUrl||'')}" placeholder="Фото (через |)">
            <input id="ePrice" type="number" value="${data.price||''}" placeholder="Цена"><input id="eAccN" type="number" step="0.1" value="${data.accelerationNoNitro||''}" placeholder="Разгон без нитро"><input id="eAccW" type="number" step="0.1" value="${data.accelerationWithNitro||''}" placeholder="Разгон с нитро">
            <input id="eTop" type="number" value="${data.topSpeed||''}" placeholder="Максималка"><select id="eNitro"><option value="none">нет</option><option value="x2" ${data.nitroType==='x2'?'selected':''}>x2</option><option value="x5" ${data.nitroType==='x5'?'selected':''}>x5</option><option value="x10" ${data.nitroType==='x10'?'selected':''}>x10</option></select>
            <select id="eCountry"><option value="none">без номера</option><option value="ru" ${data.plateCountry==='ru'?'selected':''}>Россия</option><option value="ua" ${data.plateCountry==='ua'?'selected':''}>Украина</option><option value="by" ${data.plateCountry==='by'?'selected':''}>Беларусь</option><option value="kz" ${data.plateCountry==='kz'?'selected':''}>Казахстан</option></select>
            <input id="ePlate" value="${esc(data.plateNumber||'')}" placeholder="Номер"><div class="checkbox-group"><label><input type="checkbox" value="Спорт" ${data.tunes?.includes('Спорт')?'checked':''}> Спорт</label><label><input type="checkbox" value="Спорт+" ${data.tunes?.includes('Спорт+')?'checked':''}> Спорт+</label><label><input type="checkbox" value="Комфорт" ${data.tunes?.includes('Комфорт')?'checked':''}> Комфорт</label><label><input type="checkbox" value="Дрифт" ${data.tunes?.includes('Дрифт')?'checked':''}> Дрифт</label></div>
            <textarea id="eOther">${esc(data.otherSpecs||'')}</textarea><button id="saveEditBtn">💾 СОХРАНИТЬ</button><button id="cancelBtn" style="background:#333;">ОТМЕНА</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('saveEditBtn').onclick = () => {
            let c = document.getElementById('eCountry').value, p = document.getElementById('ePlate').value.trim();
            if(!validatePlate(c, p)) { msg("❌ Неверный номер"); return; }
            const tunes = Array.from(document.querySelectorAll('#eName ~ .checkbox-group input:checked')).map(cb=>cb.value);
            const upd = { name: document.getElementById('eName').value.trim(), imageUrl: document.getElementById('eImg').value.trim(), price: parseInt(document.getElementById('ePrice').value)||null, accelerationNoNitro: parseFloat(document.getElementById('eAccN').value)||null, accelerationWithNitro: parseFloat(document.getElementById('eAccW').value)||null, topSpeed: parseInt(document.getElementById('eTop').value)||null, nitroType: document.getElementById('eNitro').value, plateCountry: c, plateNumber: p, tunes, otherSpecs: document.getElementById('eOther').value.trim() };
            if(!upd.name) { msg("Введите название"); return; }
            carsRef.child(id).update(upd).then(()=>{ msg("✅ Сохранено","success"); modal.remove(); });
        };
        document.getElementById('cancelBtn').onclick = () => modal.remove();
    }

    function createCar() {
        if(!admin) return;
        let c = document.getElementById('plateCountry').value, p = document.getElementById('plateNumber').value.trim();
        if(!validatePlate(c,p)) { msg("❌ Неверный формат номера"); return; }
        const tunes = Array.from(document.querySelectorAll('#adminZone .checkbox-group input:checked')).map(cb=>cb.value);
        const newCar = { name: document.getElementById('carName').value.trim(), imageUrl: document.getElementById('carImage').value.trim(), price: parseInt(document.getElementById('price').value)||null, accelerationNoNitro: parseFloat(document.getElementById('accelerationNoNitro').value)||null, accelerationWithNitro: parseFloat(document.getElementById('accelerationWithNitro').value)||null, topSpeed: parseInt(document.getElementById('topSpeed').value)||null, nitroType: document.getElementById('nitroType').value, plateCountry: c, plateNumber: p, tunes, otherSpecs: document.getElementById('otherSpecs').value.trim() };
        if(!newCar.name) { msg("Введите название"); return; }
        carsRef.push(newCar).then(()=>{ msg("✅ МАШИНА ДОБАВЛЕНА","success"); document.querySelectorAll('#adminZone input, #adminZone select, #adminZone textarea').forEach(i=>{ if(i.type!=='checkbox') i.value=''; }); document.querySelectorAll('#adminZone .checkbox-group input').forEach(c=>c.checked=false); });
    }

    function subscribe() { if(carsRef) carsRef.on('value', snap=>{ let d=snap.val(); let arr=[]; for(let k in d) arr.push({id:k,...d[k], tunes: d[k].tunes||[]}); arr.reverse(); allCars=arr; renderAll(); }); }

    document.getElementById('createCarBtn')?.addEventListener('click', createCar);
    subscribe();
    checkAdmin();
</script>
</body>
</html>
