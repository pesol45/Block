<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal Flowchart Final</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; }
        .controls { padding: 15px; background: #fff; border-bottom: 1px solid #ddd; text-align: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        textarea { width: 30%; padding: 15px; font-family: monospace; background: #282c34; color: #fff; border: none; font-size: 13px; }
        #diagram { flex: 1; background: #fff; overflow: auto; padding: 20px; display: flex; justify-content: center; }
        button { padding: 10px 25px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="render()">ПОСТРОИТЬ ПРАВИЛЬНУЮ СХЕМУ</button>
</div>

<div class="main">
    <textarea id="code">
program Task;
begin
  readln(x);
  if x > 6 then
    y := sqr(sin(sqrt(x))) + cos(sqrt(x))
  else if x <= 2 then
    y := 8 * (x * x * x) + 5 * sqr(x) - sin(2 * x)
  else
    writeln('Не определено');
  writeln(y);
end.</textarea>
    <div id="diagram"><div id="graph" class="mermaid"></div></div>
</div>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    function clean(t) {
        return t.replace(/;/g, '').replace(/'/g, '').replace(/\(/g, '[').replace(/\)/g, ']').trim();
    }

    async function render() {
        const input = document.getElementById('code').value;
        const output = document.getElementById('graph');
        
        const lines = input.split('\n')
            .map(l => l.trim())
            .filter(l => l !== '' && !l.toLowerCase().includes('program') && !l.toLowerCase().includes('var') && l.toLowerCase() !== 'begin' && !l.toLowerCase().startsWith('end'));

        let m = "graph TD\n  Start([Начало])\n";
        let lastNode = "Start";
        let nodeIdx = 0;
        let mergeNodes = [];

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let low = line.toLowerCase();

            if (low.startsWith('if ') || low.includes('else if')) {
                let cond = line.replace(/if|then|else/gi, '').trim();
                let ifId = `if_${nodeIdx++}`;
                let thenId = `then_${i}`;
                
                m += `  ${lastNode} --> ${ifId}{"${clean(cond)}"}\n`;
                m += `  ${ifId} -- Да --> ${thenId}["${clean(lines[i+1])}"]\n`;
                
                let mId = `m_${nodeIdx++}`;
                m += `  ${thenId} --> ${mId}(( ))\n`;
                mergeNodes.push(mId);

                m += `  ${ifId} -- Нет --> `;
                lastNode = ifId;
                i++; 
            } else if (low.startsWith('else')) {
                let elseId = `else_${i}`;
                m += `${elseId}["${clean(lines[i+1])}"]\n`;
                let mFinal = mergeNodes[mergeNodes.length-1];
                m += `  ${elseId} --> ${mFinal}\n`;
                lastNode = mFinal;
                i++;
            } else if (low.startsWith('write') || low.startsWith('read')) {
                let ioId = `io_${i}`;
                m += `  ${lastNode} --> ${ioId}[/"${clean(line)}"/]\n`;
                lastNode = ioId;
            } else {
                let sId = `s_${i}`;
                m += `  ${lastNode} --> ${sId}["${clean(line)}"]\n`;
                lastNode = sId;
            }
        }

        // Соединяем все точки слияния, если они зависли
        mergeNodes.forEach(mId => {
            if (!m.includes(`--> ${mId}`)) return; 
        });

        m += `\n  ${lastNode} --> End([Конец])`;

        output.removeAttribute('data-processed');
        output.innerHTML = m;
        await mermaid.run({ nodes: [output] });
    }
</script>
</body>
</html>
