<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pascal Flowchart Fix 5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f6; }
        .header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .main { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        #pascalCode { width: 40%; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; border-radius: 8px; border: 1px solid #ddd; background: #1e1e1e; color: #d4d4d4; font-size: 14px; outline: none; }
        #diagram-container { flex: 1; background: white; border-radius: 8px; border: 1px solid #ddd; display: flex; flex-direction: column; }
        .controls { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        button { padding: 12px 40px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        #mermaidGraph { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="header">PASCAL TO FLOWCHART GENERATOR 5.0</div>
<div class="controls">
    <button onclick="buildFlowchart()">ПОСТРОИТЬ БЛОК-СХЕМУ</button>
</div>

<div class="main">
    <textarea id="pascalCode" placeholder="Вставьте код здесь...">
program Test;
var
  x, y: real;
begin
  writeln('Введите x:');
  readln(x);
  
  if x > 2 then
    y := sqrt(x) + (sqrt(cos(x)) / (2 * x))
  else
    y := 5 * sqr(x) + 4 * x + 1;
    
  writeln('Ответ y = ', y:0:2);
  readln;
end.</textarea>
    
    <div id="diagram-container">
        <div id="mermaidGraph"></div>
    </div>
</div>

<script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    // Супер-очистка текста для Mermaid
    function fixForMermaid(text) {
        if (!text) return "Действие";
        return text.replace(/;/g, '')
                   .replace(/'/g, '')
                   .replace(/\(/g, '[') // Заменяем круглые скобки на квадратные
                   .replace(/\)/g, ']')
                   .replace(/\//g, 'div') // Заменяем слэш на слово или другой символ
                   .replace(/\*/g, 'x')   // Заменяем звездочку
                   .trim();
    }

    async function buildFlowchart() {
        const code = document.getElementById('pascalCode').value;
        const output = document.getElementById('mermaidGraph');
        
        const lines = code.split('\n')
            .map(l => l.trim())
            .filter(l => l !== '' && !l.toLowerCase().includes('program') && !l.toLowerCase().includes('var') && !l.toLowerCase().includes(': real') && !l.toLowerCase().includes(': integer') && l.toLowerCase() !== 'begin' && l.toLowerCase() !== 'end.');

        let graph = "graph TD\n";
        graph += "  Start([Начало]) --> ";
        let lastId = "Start";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            let low = line.toLowerCase();

            if (low.startsWith('if ')) {
                let cond = line.match(/if\s+(.*)\s+then/i)?.[1] || "Условие";
                let ifId = `if${i}`;
                let thenId = `then${i}`;
                let elseId = `else${i}`;
                let mergeId = `merge${i}`;

                graph += `${ifId}{"${fixForMermaid(cond)}"}\n`;
                
                // Ветка Да
                graph += `  ${ifId} -- Да --> ${thenId}["${fixForMermaid(lines[i+1])}"]\n`;
                
                // Ищем Else
                let elseLineIdx = -1;
                for(let j=i; j<i+5; j++) {
                    if(lines[j] && lines[j].toLowerCase().startsWith('else')) { elseLineIdx = j; break; }
                }

                if (elseLineIdx !== -1) {
                    graph += `  ${ifId} -- Нет --> ${elseId}["${fixForMermaid(lines[elseLineIdx+1])}"]\n`;
                    graph += `  ${thenId} --> ${mergeId}(( ))\n`;
                    graph += `  ${elseId} --> ${mergeId}\n`;
                    i = elseLineIdx + 1;
                } else {
                    graph += `  ${ifId} -- Нет --> ${mergeId}(( ))\n`;
                    graph += `  ${thenId} --> ${mergeId}\n`;
                    i++;
                }
                lastId = mergeId;
                if (i < lines.length - 1) graph += `  ${lastId} --> `;
            } else if (!low.startsWith('else') && !low.startsWith('readln')) {
                let stepId = `step${i}`;
                graph += `${stepId}["${fixForMermaid(line)}"]\n`;
                lastId = stepId;
                if (i < lines.length - 1) graph += `  ${lastId} --> `;
            }
        }

        graph += `  ${lastId} --> Finish([Конец])`;

        try {
            output.innerHTML = `<div class="mermaid">${graph}</div>`;
            await mermaid.run({ nodes: [output.querySelector('.mermaid')] });
        } catch (err) {
            console.error(err);
            output.innerHTML = "<p style='color:red; padding:20px;'>Ошибка отрисовки. Попробуйте упростить формулы в коде.</p>";
        }
    }
</script>
</body>
</html>
